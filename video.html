<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Visionnage Obligatoire</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .video-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: #ffcc00;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 25px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            margin-bottom: 25px;
            border: 2px solid #333;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn-next {
            width: 100%;
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: not-allowed;
            transition: all 0.3s;
            text-transform: uppercase;
            box-sizing: border-box;
        }
        .btn-next.ready {
            background-color: #00cc44;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 204, 68, 0.4);
        }
        .btn-next.ready:hover {
            background-color: #00ff55;
        }
        .alert-box {
            color: #ff3333;
            background-color: rgba(255, 51, 51, 0.1);
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="video-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.jpg" alt="Logo Point Focal" style="max-width: 120px; height: auto; border-radius: 4px;">
    </div>

    <h2>Étape 3 : Vidéo de Présentation Officielle</h2>
    <p>Vous devez visionner l'intégralité de la vidéo (200 secondes minimum) pour débloquer la suite du tunnel.</p>

    <div class="video-wrapper">
        <iframe id="presentationVideo" src="https://www.youtube.com/embed/VIDEO_ID?enablejsapi=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <button id="btnNext" class="btn-next" disabled onclick="validerVisionnageServeur()">
        Veuillez visionner la vidéo (<span id="timerText">200</span>s)
    </button>

    <div id="errorAlert" class="alert-box"></div>
</div>

<script>
    let secondesRestantes = 200;
    let chronoDemarre = false;
    let interval;
    const btnNext = document.getElementById('btnNext');
    const timerText = document.getElementById('timerText');
    const errorAlert = document.getElementById('errorAlert');

    // Écoute de l'API YouTube Player pour détecter le clic "Lecture"
    window.addEventListener('message', function(event) {
        if (event.origin.includes('youtube.com')) {
            try {
                const data = JSON.parse(event.data);
                if (data.event === 'infoDelivery' && data.info && data.info.playerState === 1) {
                    if (!chronoDemarre) {
                        declencherChronoServeur();
                    }
                }
            } catch (e) {}
        }
    });

    async function declencherChronoServeur() {
        chronoDemarre = true;
        errorAlert.style.display = 'none';

        try {
            const response = await fetch('https://point-focal.onrender.com/api/video/start', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}` 
                }
            });

            if(!response.ok) throw new Error("Impossible d'initialiser le chrono côté serveur.");

            interval = setInterval(() => {
                secondesRestantes--;
                timerText.innerText = secondesRestantes;

                if (secondesRestantes <= 0) {
                    clearInterval(interval);
                    btnNext.className = "btn-next ready";
                    btnNext.removeAttribute("disabled");
                    btnNext.innerText = "Étape Suivante : Obtenir mon lien Victory";
                }
            }, 1000);

        } catch (err) {
            chronoDemarre = false;
            errorAlert.innerText = "Erreur de communication avec le serveur. Veuillez relancer la vidéo.";
            errorAlert.style.display = 'block';
        }
    }

    async function validerVisionnageServeur() {
        errorAlert.style.display = 'none';

        try {
            const response = await fetch('https://point-focal.onrender.com/api/video/verify', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}` 
                }
            });

            const data = await response.json();

            if (response.ok && data.ok) {
                window.location.href = "victory-link.html";
            } else {
                errorAlert.innerText = data.error || "Temps de visionnage insuffisant validé par le serveur.";
                errorAlert.style.display = 'block';
            }
        } catch (err) {
            errorAlert.innerText = "Erreur réseau lors de la validation.";
            errorAlert.style.display = 'block';
        }
    }
</script>

</body>
</html>
