<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Visionnage Obligatoire</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .video-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h2 {
            color: #ffcc00;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 25px;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            margin-bottom: 25px;
            border: 2px solid #333;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .btn-next {
            background-color: #555555;
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 6px;
            cursor: not-allowed;
            transition: all 0.3s;
            text-transform: uppercase;
            width: 100%;
        }
        .btn-next.ready {
            background-color: #00cc44;
            color: #000;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 204, 68, 0.4);
        }
        .btn-next.ready:hover {
            background-color: #00ff55;
        }
        .alert-box {
            color: #ff3333;
            background-color: rgba(255, 51, 51, 0.1);
            padding: 12px;
            border-radius: 6px;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="video-container">
    <h2>Étape 3 : Vidéo de Présentation Officielle</h2>
    <p>Vous devez visionner l'intégralité de la vidéo (200 secondes minimum) pour débloquer la suite du tunnel.</p>

    <div class="video-wrapper">
        <iframe id="presentationVideo" src="https://www.youtube.com/embed/VIDEO_ID?enablejsapi=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>

    <button id="btnNext" class="btn-next" disabled onclick="validerVisionnageServeur()">
        Veuillez visionner la vidéo (<span id="timerText">200</span>s)
    </button>

    <div id="errorAlert" class="alert-box"></div>
</div>

<script>
    let secondesRestantes = 200;
    let chronoDemanre = false;
    let interval;
    const btnNext = document.getElementById('btnNext');
    const timerText = document.getElementById('timerText');
    const errorAlert = document.getElementById('errorAlert');

    // Détection du clic/lecture sur la vidéo via l'API postMessage de YouTube
    window.addEventListener('message', function(event) {
        // Sécurité pour vérifier que le message vient bien de YouTube
        if (event.origin.includes('youtube.com')) {
            const data = JSON.parse(event.data);
            // event.info.playerState === 1 signifie que la vidéo est en mode "PLAY"
            if (data.event === 'infoDelivery' && data.info && data.info.playerState === 1) {
                if (!chronoDemanre) {
                    declencherChronoServeur();
                }
            }
        }
    });

    // 1. SIGNAL AU SERVEUR : L'utilisateur lance la lecture
    async function declencherChronoServeur() {
        chronoDemanre = true;
        errorAlert.style.display = 'none';

        try {
            const response = await fetch('/api/video/start', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}` 
                }
            });

            // Lancement du compte à rebours visuel uniquement si le serveur a validé le départ
            interval = setInterval(() => {
                secondesRestantes--;
                timerText.innerText = secondesRestantes;

                if (secondesRestantes <= 0) {
                    clearInterval(interval);
                    btnNext.className = "btn-next ready";
                    btnNext.removeAttribute("disabled");
                    btnNext.innerText = "Étape Suivante : Obtenir mon lien Victory";
                }
            }, 1000);

        } catch (err) {
            chronoDemanre = false;
            errorAlert.innerText = "Erreur de connexion avec le serveur de sécurité. Veuillez relancer.";
            errorAlert.style.display = 'block';
        }
    }

    // 2. INTERROGATION FINALE : Le serveur vérifie si le compte est bon
    async function validerVisionnageServeur() {
        errorAlert.style.display = 'none';

        try {
            const response = await fetch('/api/video/verify', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${localStorage.getItem('token')}` 
                }
            });

            const data = await response.json();

            if (response.ok && data.ok) {
                // Validation réussie, redirection immédiate vers l'étape d'attribution du lien Victory
                window.location.href = "/victory-link.html";
            } else {
                // Si l'utilisateur a triché, le serveur renvoie l'erreur et on l'affiche
                errorAlert.innerText = data.error || "Triche détectée : Temps de visionnage insuffisant.";
                errorAlert.style.display = 'block';
            }
        } catch (err) {
            errorAlert.innerText = "Erreur réseau lors de la validation.";
            errorAlert.style.display = 'block';
        }
    }
</script>

</body>
</html>
