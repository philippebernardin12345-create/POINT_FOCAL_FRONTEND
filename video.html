<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Présentation Officielle</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0B0E11;
            color: #EAECEF;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .video-container {
            background-color: #1E2329;
            padding: 30px;
            border-radius: 4px;
            max-width: 800px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h2 {
            color: #EAECEF;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 600;
            text-align: left;
        }
        .subtitle {
            color: #848E9C;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: left;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 4px;
            background-color: #000000;
            margin-bottom: 25px;
            border: 1px solid #2B3139;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .btn-next {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: #F0B90B;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background-color 0.2s;
        }
        .btn-next:hover {
            background-color: #FFE15D;
        }
    </style>
</head>
<body>

<div class="video-container">
    <h2>Outil de Présentation Stratégique</h2>
    <p class="subtitle">Prenez le temps de liker, commenter et vous abonner pour maximiser le référencement algorithmique de la communauté.</p>
    
    <div class="video-wrapper">
        <!-- Remplacer VOTRE_ID_VIDEO par l'identifiant réel de votre vidéo YouTube -->
        <iframe src="https://www.youtube.com/embed/VOTRE_ID_VIDEO?rel=0&modestbranding=1" allowfullscreen></iframe>
    </div>

    <a href="victory-link.html" class="btn-next">J'ai visionné et interagi — Passer à l'activation</a>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        if (!localStorage.getItem('token')) {
            window.location.href = "register.html";
        }
    });
</script>
</body>
</html>
