<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Point Focal - Étape Communautaire</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 20px;
      background: #0b0e11;
      color: #eaecef;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 550px;
      padding: 35px 25px;
      background: #1e2329;
      border-radius: 10px;
      text-align: center;
    }

    h2 {
      margin-top: 0;
      color: #f0b90b;
    }

    p {
      color: #b7bdc6;
      line-height: 1.6;
    }

    .btn-youtube,
    #btnValidation {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 16px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    .btn-youtube {
      background: #ff0000;
      color: #ffffff;
    }

    #btnValidation {
      background: #f0b90b;
      color: #0b0e11;
    }

    #btnValidation:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #aideRetour {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: rgba(240, 185, 11, 0.1);
      border-left: 4px solid #f0b90b;
      color: #eaecef;
      text-align: left;
      line-height: 1.5;
    }

    #messageChargement {
      margin-top: 20px;
      color: #f0b90b;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>🎯 Étape Communautaire</h2>

  <p>
    Pour activer votre compte, ouvrez la vidéo officielle sur YouTube,
    abonnez-vous à la chaîne et laissez un commentaire.
  </p>

  <div id="messageChargement">
    Vérification de votre progression...
  </div>

  <a
    id="btnYoutube"
    href="https://www.youtube.com/watch?v=9uPybhkqYw4"
    target="_blank"
    rel="noopener noreferrer"
    class="btn-youtube"
    onclick="ouvrirYoutube()"
    style="display:none;"
  >
    ▶️ OUVRIR DANS YOUTUBE
  </a>

  <div id="aideRetour">
    💡 Revenez sur Point Focal après YouTube.
    Le bouton de continuation apparaîtra ici.
  </div>

  <button
    id="btnValidation"
    type="button"
    onclick="validerEtape()"
    disabled
    style="display:none;"
  >
    ✅ Continuer sur Point Focal
  </button>
</div>

<script>
  const API_BASE_URL = "https://point-focal.onrender.com/api";
  const RETOUR_YOUTUBE_KEY = "point_focal_retour_youtube";

  let verificationEnCours = false;
  let validationEnCours = false;

  window.addEventListener("DOMContentLoaded", initialiserPage);

  async function initialiserPage() {
    const token = localStorage.getItem("token");

    if (!token) {
      alert("Session non trouvée. Connectez-vous d'abord.");
      window.location.replace("login.html");
      return;
    }

    const videoDejaValidee = await verifierVideoDejaVue();

    if (videoDejaValidee) {
      return;
    }

    document.getElementById("messageChargement").style.display = "none";
    document.getElementById("btnYoutube").style.display = "block";

    restaurerEtatRetour();
  }

  function ouvrirYoutube() {
    localStorage.setItem(RETOUR_YOUTUBE_KEY, "true");
    afficherBoutonRetour();
  }

  window.addEventListener("focus", () => {
    const retourYoutube =
      localStorage.getItem(RETOUR_YOUTUBE_KEY) === "true";

    if (retourYoutube) {
      afficherBoutonRetour();
    }
  });

  document.addEventListener("visibilitychange", () => {
    const retourYoutube =
      localStorage.getItem(RETOUR_YOUTUBE_KEY) === "true";

    if (!document.hidden && retourYoutube) {
      afficherBoutonRetour();
    }
  });

  function restaurerEtatRetour() {
    const retourYoutube =
      localStorage.getItem(RETOUR_YOUTUBE_KEY) === "true";

    if (retourYoutube) {
      afficherBoutonRetour();
    }
  }

  function afficherBoutonRetour() {
    const aideRetour = document.getElementById("aideRetour");
    const btnValidation = document.getElementById("btnValidation");

    aideRetour.style.display = "block";
    btnValidation.style.display = "block";
    btnValidation.disabled = false;
    btnValidation.classList.add("ready");
    btnValidation.innerText = "✅ Continuer sur Point Focal";
  }

  async function verifierVideoDejaVue() {
    if (verificationEnCours) {
      return false;
    }

    verificationEnCours = true;

    try {
      const token = localStorage.getItem("token");

      const res = await fetch(`${API_BASE_URL}/video/session`, {
        method: "GET",
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: "application/json"
        }
      });

      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("token");
        localStorage.removeItem("user");

        alert("Votre session a expiré. Veuillez vous reconnecter.");
        window.location.replace("login.html");
        return true;
      }

      if (!res.ok) {
        const errorText = await res.text();
        console.error(
          "Erreur vérification vidéo :",
          res.status,
          errorText
        );

        return false;
      }

      const result = await res.json();

      const session =
        result.data ||
        result.session ||
        result.videoSession ||
        result;

      const videoCompletee =
        session?.isCompleted === true ||
        session?.completed === true ||
        session?.videoCompleted === true ||
        session?.video_completed === true ||
        session?.watchedSeconds >= 200 ||
        session?.watched_seconds >= 200;

      if (videoCompletee) {
        enregistrerVideoCompleteeLocalement();

        localStorage.removeItem(RETOUR_YOUTUBE_KEY);

        window.location.replace("victory-link.html");
        return true;
      }

      return false;
    } catch (error) {
      console.error("Erreur vérification vidéo :", error);
      return false;
    } finally {
      verificationEnCours = false;
    }
  }

  async function validerEtape() {
    const btnValidation =
      document.getElementById("btnValidation");

    if (!btnValidation.classList.contains("ready")) {
      return;
    }

    if (validationEnCours) {
      return;
    }

    validationEnCours = true;
    btnValidation.disabled = true;
    btnValidation.innerText = "Validation en cours...";

    try {
      const token = localStorage.getItem("token");

      if (!token) {
        alert("Session non trouvée. Reconnectez-vous.");
        window.location.replace("login.html");
        return;
      }

      const res = await fetch(`${API_BASE_URL}/video/progress`, {
        method: "POST",
        headers: {
          Authorization: `Bearer ${token}`,
          "Content-Type": "application/json",
          Accept: "application/json"
        },
        body: JSON.stringify({
          watchedSeconds: 200
        })
      });

      const responseText = await res.text();

      let result = {};

      try {
        result = responseText
          ? JSON.parse(responseText)
          : {};
      } catch {
        result = {
          message: responseText
        };
      }

      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem("token");
        localStorage.removeItem("user");

        alert("Votre session a expiré. Veuillez vous reconnecter.");
        window.location.replace("login.html");
        return;
      }

      if (!res.ok) {
        throw new Error(
          result.message ||
          result.error ||
          "La validation de la vidéo a échoué."
        );
      }

      enregistrerVideoCompleteeLocalement();

      localStorage.removeItem(RETOUR_YOUTUBE_KEY);

      window.location.replace("victory-link.html");
    } catch (error) {
      console.error("Erreur validation vidéo :", error);

      alert(
        "Validation impossible : " +
        (error.message || "Une erreur est survenue.")
      );

      btnValidation.disabled = false;
      btnValidation.innerText = "✅ Continuer sur Point Focal";
    } finally {
      validationEnCours = false;
    }
  }

  function enregistrerVideoCompleteeLocalement() {
    let user = {};

    try {
      user = JSON.parse(
        localStorage.getItem("user") || "{}"
      );
    } catch {
      user = {};
    }

    user.videoCompleted = true;
    user.video_completed = true;

    localStorage.setItem(
      "user",
      JSON.stringify(user)
    );
  }
</script>

</body>
</html>
