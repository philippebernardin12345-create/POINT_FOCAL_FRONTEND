<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Point Focal - Étape Communautaire</title>
</head>
<body>

<div class="container">
  <h2>🎯 Étape Communautaire</h2>

  <p>
    Pour activer votre compte, ouvrez la vidéo officielle sur YouTube,
    abonnez-vous à la chaîne et laissez un commentaire.
  </p>

  <a
    href="https://www.youtube.com/watch?v=9uPybhkqYw4"
    target="_blank"
    rel="noopener"
    class="btn-youtube"
    onclick="ouvrirYoutube()"
  >
    ▶️ OUVRIR DANS YOUTUBE
  </a>

  <div id="aideRetour" style="display:none; margin-top:20px;">
    💡 Revenez sur Point Focal après YouTube. Le bouton de continuation apparaîtra ici.
  </div>

  <button
    id="btnValidation"
    onclick="validerEtape()"
    disabled
    style="display:none; margin-top:20px; width:100%; padding:16px; font-weight:bold;"
  >
    ✅ Continuer sur Point Focal
  </button>
</div>

<script>
const API_BASE_URL = "https://point-focal.onrender.com/api";
const RETOUR_YOUTUBE_KEY = "point_focal_retour_youtube";

window.addEventListener("DOMContentLoaded", async () => {
  const token = localStorage.getItem("token");
  const user = JSON.parse(localStorage.getItem("user") || "{}");

  if (!token) {
    alert("Session non trouvée. Connectez-vous d'abord.");
    window.location.href = "login.html";
    return;
  }

  if (user && user.hasVictoryLink) {
    window.location.href = user.isActivated ? "dashboard.html" : "payment.html";
    return;
  }

  restaurerEtatRetour();

  await verifierVideoDejaVue();
});

function ouvrirYoutube() {
  localStorage.setItem(RETOUR_YOUTUBE_KEY, "true");
  document.getElementById("aideRetour").style.display = "block";
}

window.addEventListener("focus", () => {
  if (localStorage.getItem(RETOUR_YOUTUBE_KEY) === "true") {
    afficherBoutonRetour();
  }
});

document.addEventListener("visibilitychange", () => {
  if (!document.hidden && localStorage.getItem(RETOUR_YOUTUBE_KEY) === "true") {
    afficherBoutonRetour();
  }
});

function restaurerEtatRetour() {
  if (localStorage.getItem(RETOUR_YOUTUBE_KEY) === "true") {
    afficherBoutonRetour();
  }
}

function afficherBoutonRetour() {
  const aideRetour = document.getElementById("aideRetour");
  const btn = document.getElementById("btnValidation");

  aideRetour.style.display = "block";

  btn.style.display = "block";
  btn.disabled = false;
  btn.classList.add("ready");
  btn.innerText = "✅ Continuer sur Point Focal";
}

async function verifierVideoDejaVue() {
  try {
    const res = await fetch(`${API_BASE_URL}/video/session`, {
      method: "GET",
      headers: {
        Authorization: `Bearer ${localStorage.getItem("token")}`
      }
    });

    if (!res.ok) return;

    const result = await res.json();
    const session = result.data;

    if (session && session.isCompleted === true) {
      localStorage.removeItem(RETOUR_YOUTUBE_KEY);
      window.location.href = "victory-link.html";
    }
  } catch (error) {
    console.error("Erreur vérification vidéo:", error);
  }
}

async function validerEtape() {
  const btn = document.getElementById("btnValidation");

  if (!btn.classList.contains("ready")) return;

  try {
    const res = await fetch(`${API_BASE_URL}/video/progress`, {
      method: "POST",
      headers: {
        Authorization: `Bearer ${localStorage.getItem("token")}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        watchedSeconds: 200
      })
    });

    if (res.ok) {
      localStorage.removeItem(RETOUR_YOUTUBE_KEY);

      const user = JSON.parse(localStorage.getItem("user") || "{}");
      user.hasVictoryLink = true;
      localStorage.setItem("user", JSON.stringify(user));

      window.location.href = "victory-link.html";
    } else {
      alert("Validation impossible. Réessayez.");
    }
  } catch (error) {
    console.error("Erreur validation vidéo:", error);
    alert("Une erreur est survenue.");
  }
}
</script>

</body>
</html>
