<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Focal - Paiement Test</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #0B0E11;
  color: #EAECEF;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.payment-container {
  background-color: #1E2329;
  padding: 35px 25px;
  border-radius: 10px;
  max-width: 550px;
  width: 100%;
}

h2 {
  color: #F0B90B;
  margin-bottom: 12px;
}

.subtitle {
  color: #848E9C;
  font-size: 14px;
  margin-bottom: 25px;
  line-height: 1.5;
}

.test-box {
  background: rgba(240,185,11,0.12);
  border-left: 4px solid #F0B90B;
  padding: 14px;
  margin-bottom: 25px;
  color: #F0B90B;
  font-size: 14px;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  margin-bottom: 8px;
  font-size: 13px;
  color: #B7BDC6;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 13px;
  background-color: #2B3139;
  border: 1px solid #2B3139;
  color: #EAECEF;
  border-radius: 6px;
  font-size: 14px;
}

input:focus {
  border-color: #F0B90B;
  outline: none;
}

button {
  width: 100%;
  padding: 15px;
  background: #F0B90B;
  color: #000;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

.status-box {
  padding: 15px;
  border-radius: 6px;
  margin-top: 20px;
  font-size: 14px;
  display: none;
  line-height: 1.5;
}

.status-success {
  background-color: rgba(2,192,118,0.1);
  border-left: 4px solid #02C076;
  color: #02C076;
}

.status-error {
  background-color: rgba(234,57,67,0.1);
  border-left: 4px solid #EA3943;
  color: #EA3943;
}
</style>
</head>

<body>

<div class="payment-container">
  <h2>💳 Paiement sécurisé - Mode Test</h2>

  <p class="subtitle">
    Cette page est en mode test pour vérifier le cheminement complet de Point Focal.
  </p>

  <div class="test-box">
    Pour tester, utilisez :<br>
    Adresse cible : <strong>0x1111111111111111111111111111111111111111</strong><br>
    Hash test : <strong>TEST123456</strong>
  </div>

  <div class="form-group">
    <label>1. Lien Victory Automatic</label>
    <input type="text" id="victoryLink" placeholder="Collez votre lien Victory Automatic">
  </div>

  <div class="form-group">
    <label>2. Adresse cible</label>
    <input type="text" id="adresseCible" placeholder="0x1111111111111111111111111111111111111111">
  </div>

  <div class="form-group">
    <label>3. Hash de transaction</label>
    <input type="text" id="txHash" placeholder="TEST123456">
  </div>

  <button type="button" onclick="validerPaiementTest()">
    Valider le paiement test
  </button>

  <div id="statusBox" class="status-box"></div>
</div>

<script>
function validerPaiementTest() {
  const victoryLink = document.getElementById("victoryLink").value.trim();
  const adresseCible = document.getElementById("adresseCible").value.trim();
  const txHash = document.getElementById("txHash").value.trim();
  const statusBox = document.getElementById("statusBox");

  statusBox.style.display = "block";

  if (!localStorage.getItem("token")) {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Session expirée. Veuillez vous reconnecter.";
    return;
  }

  if (victoryLink.length < 10) {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Lien Victory Automatic obligatoire.";
    return;
  }

  if (adresseCible !== "0x1111111111111111111111111111111111111111") {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Adresse cible test invalide.";
    return;
  }

  if (txHash !== "TEST123456") {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Hash test invalide. Utilisez TEST123456.";
    return;
  }

  localStorage.setItem("publicLink", "https://pointfocalapp.com/register.html?ref=TESTUSER");

  statusBox.className = "status-box status-success";
  statusBox.innerText = "Paiement test validé. Redirection vers le tableau de bord...";

  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 1500);
}
</script>

</body>
</html>
