<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Validation Automatique</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0B0E11;
            color: #EAECEF;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .payment-container {
            background-color: #1E2329;
            padding: 40px 30px;
            border-radius: 4px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h2 {
            color: #EAECEF;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 600;
            text-align: left;
        }
        .subtitle { color: #848E9C; font-size: 14px; margin-bottom: 25px; text-align: left; line-height: 1.4; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: #848E9C; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            background-color: #2B3139;
            border: 1px solid #2B3139;
            color: #EAECEF;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #F0B90B; outline: none; }
        .status-box {
            padding: 15px;
            border-radius: 4px;
            margin-top: 25px;
            font-size: 14px;
            text-align: left;
            display: none;
            line-height: 1.5;
        }
        .status-loading { background-color: rgba(240, 185, 11, 0.1); border-left: 4px solid #F0B90B; color: #F0B90B; }
        .status-success { background-color: rgba(2, 192, 118, 0.1); border-left: 4px solid #02C076; color: #02C076; }
        .status-error { background-color: rgba(234, 57, 67, 0.1); border-left: 4px solid #EA3943; color: #EA3943; }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>💳 Formulaire de Validation</h2>
    <p class="subtitle">L'ordre des champs est obligatoire. La soumission et l'audit réseau s'effectuent de manière entièrement autonome au remplissage du dernier critère.</p>
    
    <div class="form-group">
        <label>1. Lien Victory Automatic</label>
        <input type="text" id="victoryLink" placeholder="Collez le lien Victory reçu">
    </div>

    <div class="form-group">
        <label>2. Adresse cible (Débute par 0x - Longueur exacte : 42)</label>
        <input type="text" id="adresseCible" maxlength="42" placeholder="0x...">
    </div>

    <div class="form-group">
        <label>3. Hash de transaction (Débute par 0x - Longueur exacte : 66)</label>
        <input type="text" id="txHash" maxlength="66" placeholder="0x...">
    </div>

    <div id="statusBox" class="status-box"></div>
</div>

<script>
const BASE_API = "https://point-focal-backend.onrender.com/api";

function verifierFormulaireAutomatique() {
    const victoryLink = document.getElementById("victoryLink").value.trim();
    const adresseCible = document.getElementById("adresseCible").value.trim();
    const txHash = document.getElementById("txHash").value.trim();
    const statusBox = document.getElementById("statusBox");

    const isVictoryFilled = victoryLink.length > 10;
    const isAddressValid = adresseCible.startsWith("0x") && adresseCible.length === 42;
    const isHashValid = txHash.startsWith("0x") && txHash.length === 66;

    if (isVictoryFilled && isAddressValid && isHashValid) {
        statusBox.style.display = "block";
        statusBox.className = "status-box status-loading";
        statusBox.innerHTML = "⚡ <strong>DÉCLENCHEMENT AUTOMATIQUE</strong> : Validation cryptographique BSC lancée. Analyse des 12 confirmations et du montant requis de 2.03 USDT BEP20...";
        
        executerValidationDon(victoryLink, adresseCible, txHash);
    }
}

async function executerValidationDon(victoryLink, adresseCible, txHash) {
    const statusBox = document.getElementById("statusBox");
    try {
        const response = await fetch(`${BASE_API}/payment/auto-trigger`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${localStorage.getItem("token")}`
            },
            body: JSON.stringify({ victoryLink, adresseCible, txHash })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            statusBox.className = "status-box status-success";
            statusBox.innerHTML = "🎉 TRANSACTION BLOCKCHAIN ACCEPTEE ! Initialisation immédiate de vos accès et de votre lien Point Focal Public...";
            
            localStorage.setItem("publicLink", data.publicLink);

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 2500);
        } else {
            statusBox.className = "status-box status-error";
            statusBox.innerHTML = `❌ REJET IMMÉDIAT : ${data.error || "Données blockchain non conformes."}`;
        }
    } catch (error) {
        statusBox.className = "status-box status-error";
        statusBox.innerHTML = "❌ Dysfonctionnement réseau avec l'API de validation.";
    }
}

document.getElementById("victoryLink").addEventListener("input", verifierFormulaireAutomatique);
document.getElementById("adresseCible").addEventListener("input", verifierFormulaireAutomatique);
document.getElementById("txHash").addEventListener("input", verifierFormulaireAutomatique);
</script>
</body>
</html>
