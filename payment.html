<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Validation Automatique Blockchain</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .payment-container {
            background-color: #1e1e1e;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.8);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 2px solid #00cc44;
        }
        h2 {
            color: #00cc44;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 20px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-size: 13px;
            color: #aaaaaa;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #252525;
            border: 1px solid #444;
            color: #ffffff;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
        }
        input:focus { border-color: #00cc44; outline: none; }
        .status-box {
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 14px;
            text-align: left;
            display: none;
            line-height: 1.5;
        }
        .status-loading { background-color: rgba(0, 204, 200, 0.1); border: 1px solid #00cccc; color: #00ffff; }
        .status-success { background-color: rgba(0, 204, 68, 0.1); border: 1px solid #00cc44; color: #a3e635; }
        .status-error { background-color: rgba(255, 51, 51, 0.1); border: 1px solid #ff3333; color: #ff8888; }
    </style>
</head>
<body>

<div class="payment-container">
    <h2>💳 Formulaire de Validation</h2>
    <p style="color: #aaa; font-size: 14px; margin-bottom: 25px;">Ordre obligatoire des champs. La validation se lance automatiquement sans bouton dès le remplissage du 3ème champ.</p>
    
    <div class="form-group">
        <label>1. Lien Victory Automatic</label>
        <input type="text" id="victoryLink" placeholder="Entrez le lien officiel reçu">
    </div>

    <div class="form-group">
        <label>2. Adresse Cible (Doit commencer par 0x - Longueur: 42)</label>
        <input type="text" id="adresseCible" maxlength="42" placeholder="0x...">
    </div>

    <div class="form-group">
        <label>3. Hash de Transaction (Doit commencer par 0x - Longueur: 66)</label>
        <input type="text" id="txHash" maxlength="66" placeholder="0x...">
    </div>

    <div id="statusBox" class="status-box"></div>
</div>

<script>
const BASE_API = "https://point-focal-backend.onrender.com/api";

function verifierFormulaireAutomatique() {
    const victoryLink = document.getElementById("victoryLink").value.trim();
    const adresseCible = document.getElementById("adresseCible").value.trim();
    const txHash = document.getElementById("txHash").value.trim();
    const statusBox = document.getElementById("statusBox");

    // Validation stricte des formats et longueurs requises (Section 6)
    const isVictoryFilled = victoryLink.length > 10;
    const isAddressValid = adresseCible.startsWith("0x") && adresseCible.length === 42;
    const isHashValid = txHash.startsWith("0x") && txHash.length === 66;

    if (isVictoryFilled && isAddressValid && isHashValid) {
        // Section 8 : Déclenchement automatique sans bouton supplémentaire
        statusBox.style.display = "block";
        statusBox.className = "status-box status-loading";
        statusBox.innerHTML = "⚡ <strong>DÉCLENCHEMENT AUTOMATIQUE</strong> : Validation blockchain (BSC) en cours... (USDT BEP20, Montant exact : 2.03, 12 confirmations).";
        
        executerValidationDon(victoryLink, adresseCible, txHash);
    }
}

async function executerValidationDon(victoryLink, adresseCible, txHash) {
    const statusBox = document.getElementById("statusBox");
    const token = localStorage.getItem("token");

    try {
        const response = await fetch(`${BASE_API}/payment/auto-trigger`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({ victoryLink, adresseCible, txHash })
        });

        const data = await response.json();

        if (response.ok && data.success) {
            statusBox.className = "status-box status-success";
            statusBox.innerHTML = "🎉 PAIEMENT VALIDÉ ! Génération immédiate des liens Point Focal Public...";
            
            localStorage.setItem("publicLink", data.publicLink);

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 2000);
        } else {
            statusBox.className = "status-box status-error";
            statusBox.innerHTML = `❌ Rejet immédiat : ${data.error || "Critères de transaction blockchain non respectés."}`;
        }
    } catch (error) {
        statusBox.className = "status-box status-error";
        statusBox.innerHTML = "❌ Erreur de communication avec le serveur de validation.";
    }
}

document.getElementById("victoryLink").addEventListener("input", verifierFormulaireAutomatique);
document.getElementById("adresseCible").addEventListener("input", verifierFormulaireAutomatique);
document.getElementById("txHash").addEventListener("input", verifierFormulaireAutomatique);
</script>

</body>
</html>
