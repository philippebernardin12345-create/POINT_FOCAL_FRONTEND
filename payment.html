<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Focal - Validation</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: #0B0E11;
  color: #EAECEF;
  font-family: Arial, sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.payment-container {
  background-color: #1E2329;
  padding: 35px 25px;
  border-radius: 10px;
  max-width: 550px;
  width: 100%;
}

h2 { color: #F0B90B; margin-bottom: 12px; }

.subtitle, label {
  color: #B7BDC6;
  font-size: 14px;
}

.subtitle { margin-bottom: 25px; line-height: 1.5; }

.test-box {
  background: rgba(240,185,11,0.12);
  border-left: 4px solid #F0B90B;
  padding: 14px;
  margin-bottom: 25px;
  color: #F0B90B;
  font-size: 14px;
  line-height: 1.5;
}

.form-group { margin-bottom: 18px; }

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
}

input {
  width: 100%;
  padding: 13px;
  background-color: #2B3139;
  border: 1px solid #2B3139;
  color: #EAECEF;
  border-radius: 6px;
  font-size: 14px;
}

input:focus {
  border-color: #F0B90B;
  outline: none;
}

button, .next-btn {
  width: 100%;
  padding: 15px;
  background: #F0B90B;
  color: #000;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  display: block;
  margin-top: 15px;
}

.next-btn {
  background: #02C076;
  color: white;
  display: none;
}

.status-box {
  padding: 15px;
  border-radius: 6px;
  margin-top: 20px;
  font-size: 14px;
  display: none;
  line-height: 1.5;
}

.status-success {
  background-color: rgba(2,192,118,0.1);
  border-left: 4px solid #02C076;
  color: #02C076;
}

.status-error {
  background-color: rgba(234,57,67,0.1);
  border-left: 4px solid #EA3943;
  color: #EA3943;
}

.link-box {
  background: #2B3139;
  color: #F0B90B;
  padding: 14px;
  border-radius: 6px;
  margin-top: 15px;
  word-break: break-all;
  display: none;
}
</style>
</head>

<body>

<div class="payment-container">
  <h2>💳 Validation Victory Automatic</h2>

  <p class="subtitle">
    Collez les informations dans l’ordre demandé pour générer votre lien Point Focal.
  </p>

  <div class="test-box">
    Mode test :<br>
    Adresse cible : <strong>0x1111111111111111111111111111111111111111</strong><br>
    Hash test : <strong>TEST123456</strong>
  </div>

  <div class="form-group">
    <label>1. Adresse cible</label>
    <input type="text" id="adresseCible" placeholder="0x1111111111111111111111111111111111111111">
  </div>

  <div class="form-group">
    <label>2. Hash de transaction</label>
    <input type="text" id="txHash" placeholder="TEST123456">
  </div>

  <div class="form-group">
    <label>3. Lien Victory Automatic personnel</label>
    <input type="text" id="victoryLink" placeholder="Collez votre lien Victory Automatic">
  </div>

  <button id="validateBtn" type="button" onclick="validerPaiementTest()">
    Valider et générer mon lien Point Focal
  </button>

  <div id="statusBox" class="status-box"></div>

  <div id="publicLinkBox" class="link-box"></div>

  <a id="nextOpportunityBtn" href="victory-world.html" class="next-btn">
    Je rejoins l’opportunité suivante
  </a>
</div>

<script>
function validerPaiementTest() {
  const adresseCible = document.getElementById("adresseCible").value.trim();
  const txHash = document.getElementById("txHash").value.trim();
  const victoryLink = document.getElementById("victoryLink").value.trim();

  const statusBox = document.getElementById("statusBox");
  const publicLinkBox = document.getElementById("publicLinkBox");
  const nextOpportunityBtn = document.getElementById("nextOpportunityBtn");

  statusBox.style.display = "block";

  if (!localStorage.getItem("token")) {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Session expirée. Veuillez vous reconnecter.";
    return;
  }

  if (adresseCible !== "0x1111111111111111111111111111111111111111") {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Adresse cible test invalide.";
    return;
  }

  if (txHash !== "TEST123456") {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Hash test invalide. Utilisez TEST123456.";
    return;
  }

  if (victoryLink.length < 10) {
    statusBox.className = "status-box status-error";
    statusBox.innerText = "Lien Victory Automatic obligatoire.";
    return;
  }

  const publicLink = "https://pointfocalapp.com/register.html?ref=TESTUSER";
  localStorage.setItem("publicLink", publicLink);
  localStorage.setItem("victoryAutomaticLink", victoryLink);

  statusBox.className = "status-box status-success";
  statusBox.innerText = "Validation réussie. Votre lien Point Focal est généré.";

  publicLinkBox.style.display = "block";
  publicLinkBox.innerText = publicLink;

  nextOpportunityBtn.style.display = "block";
}
</script>

</body>
</html>
