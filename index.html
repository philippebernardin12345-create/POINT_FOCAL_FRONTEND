<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Point Focal - Plateforme MLM</title>
    <style>
        /* Styles de l'interface */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .lang-selector {
            display: flex;
            gap: 10px;
        }

        .lang-btn {
            padding: 8px 15px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lang-btn:hover, .lang-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #667eea;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .timer {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            margin: 20px 0;
            color: #667eea;
            font-family: monospace;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup-content {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            border: 3px solid white;
        }

        .popup-content.black-bg {
            background: #000;
            color: #ff0;
        }

        .popup-content .red-title {
            color: #ff0000;
            font-size: 32px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .popup-content .yellow-text {
            color: #ff0;
            font-size: 18px;
            line-height: 1.6;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
        }

        .opportunity-item {
            background: #f8f9fa;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1100;
            animation: slideIn 0.3s ease;
            border-left: 4px solid #28a745;
            max-width: 350px;
        }

        .notification.error { border-left-color: #dc3545; }
        .notification.info { border-left-color: #17a2b8; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            transition: width 0.3s;
        }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-km { background: #ffd700; color: #000; }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div style="text-align: center; padding: 50px;">
            <div class="loader"></div>
            <p>Chargement...</p>
        </div>
    </div>

    <script>
        // ==================== CONFIGURATION API REMPLACÉE ====================
        const API_BASE_URL = 'https://point-focal.onrender.com/api';
        
        // Configuration requêtes HTTP (Fetch)
        const api = {
            async request(endpoint, options = {}) {
                const token = localStorage.getItem('token');
                const headers = {
                    'Content-Type': 'application/json',
                    ...options.headers
                };
                
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }
                
                try {
                    const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                        ...options,
                        headers
                    });
                    
                    const data = await response.json();
                    
                    if (!response.ok) {
                        throw new Error(data.message || 'Erreur serveur');
                    }
                    
                    return data;
                } catch (error) {
                    console.error('API Error:', error);
                    throw error;
                }
            },
            
            get(endpoint) {
                return this.request(endpoint, { method: 'GET' });
            },
            
            post(endpoint, body) {
                return this.request(endpoint, { 
                    method: 'POST',
                    body: JSON.stringify(body)
                });
            }
        };
        
        // ==================== OPPORTUNITÉS ====================
        const OPPORTUNITIES = [
            { id: 1, name: "Victory Automatic", link: "https://victoryautomatic.com/user/register/lobongo01", active: true, order: 1 },
            { id: 2, name: "Victory World Club", link: "https://victoryworld.club/longa01", active: true, order: 2 }
        ];
        
        // ==================== TRADUCTIONS ====================
        const translations = {
            fr: {
                appName: 'Point Focal', login: 'Connexion', register: 'Inscription', email: 'Email',
                whatsapp: 'WhatsApp', password: 'Mot de passe', confirmPassword: 'Confirmer le mot de passe',
                inviteCode: 'Code d\'invitation (ex: ABCD1000 ou ABCD1000KM)', forgotPassword: 'Mot de passe oublié ?',
                submit: 'Valider', logout: 'Déconnexion', dashboard: 'Tableau de bord', watchVideo: 'Je regarde la vidéo YouTube',
                getVictoryLink: 'J\'obtiens mon lien Victory Automatic', victoryLink: 'Lien Victory Automatic',
                targetAddress: 'Adresse cible (0x + 40 caractères)', transactionHash: 'Hash transaction (0x + 64 caractères)',
                myLinks: 'Mes Liens', yourFilleuls: 'Vos filleuls'
            },
            en: {
                appName: 'Point Focal', login: 'Login', register: 'Register', email: 'Email',
                whatsapp: 'WhatsApp', password: 'Password', confirmPassword: 'Confirm password',
                inviteCode: 'Invitation code', forgotPassword: 'Forgot password?',
                submit: 'Submit', logout: 'Logout', dashboard: 'Dashboard', watchVideo: 'Watch YouTube video',
                getVictoryLink: 'Get my Victory Automatic link', victoryLink: 'Victory Automatic Link',
                targetAddress: 'Target address', transactionHash: 'Transaction hash',
                myLinks: 'My Links', yourFilleuls: 'Your referrals'
            }
        };
        
        // ==================== ÉTAT DE L'APPLICATION ====================
        let currentLang = 'fr';
        let currentUser = null;
        let currentStep = 'login';
        let popupCount = 10;
        let videoCount = 200;
        let victoryCount = 172800; // 48h en secondes
        let intervalId = null;
        
        // ==================== FONCTIONS DE SOU MISSION ET TRAITEMENTS ====================
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 5000);
        }

        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            try {
                const response = await api.post('/auth/login', { email, password });
                if (response.token) {
                    localStorage.setItem('token', response.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    currentUser = response.user;
                    currentStep = 'youtubePopup';
                    render();
                }
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const whatsapp = document.getElementById('regWhatsapp').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const inviteCode = document.getElementById('regInviteCode').value;

            if (password !== confirmPassword) {
                return showNotification('Les mots de passe ne correspondent pas.', 'error');
            }

            try {
                const response = await api.post('/auth/register', { email, whatsapp, password, inviteCode });
                if (response.token) {
                    localStorage.setItem('token', response.token);
                    localStorage.setItem('user', JSON.stringify(response.user));
                    currentUser = response.user;
                    currentStep = 'youtubePopup';
                    render();
                }
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        async function handlePaymentSubmit(e) {
            e.preventDefault();
            const victoryLink = document.getElementById('victoryLink').value;
            const targetAddress = document.getElementById('targetAddress').value;
            const transactionHash = document.getElementById('transactionHash').value;

            try {
                await api.post('/payment/verify', { victoryLink, targetAddress, transactionHash, userId: currentUser?.id });
                showNotification('Données de transaction envoyées. Validation en cours !', 'info');
                currentStep = 'dashboard';
                render();
            } catch (err) {
                showNotification(err.message, 'error');
            }
        }

        // ==================== COMPTEURS / TIMERS ====================
        function startYoutubeTimer() {
            clearInterval(intervalId);
            popupCount = 10;
            intervalId = setInterval(() => {
                popupCount--;
                const el = document.getElementById('popupTimer');
                if (el) el.innerText = popupCount;
                if (popupCount <= 0) {
                    clearInterval(intervalId);
                    const btn = document.getElementById('popupNextBtn');
                    if (btn) {
                        btn.removeAttribute('disabled');
                        btn.onclick = () => { currentStep = 'video'; render(); };
                    }
                }
            }, 1000);
        }

        function startVideoTimer() {
            clearInterval(intervalId);
            videoCount = 200;
            intervalId = setInterval(() => {
                videoCount--;
                const timerEl = document.getElementById('videoTimer');
                const progressEl = document.getElementById('videoProgress');
                if (timerEl) timerEl.innerText = videoCount;
                if (progressEl) progressEl.style.width = `${((200 - videoCount) / 200) * 100}%`;

                if (videoCount <= 0) {
                    clearInterval(intervalId);
                    const btn = document.getElementById('nextAfterVideoBtn');
                    if (btn) {
                        btn.removeAttribute('disabled');
                        btn.onclick = () => { currentStep = 'victory'; render(); };
                    }
                }
            }, 1000);
        }

        function startVictoryTimer() {
            const isKM = currentUser?.inviteCode?.endsWith('KM');
            if (isKM) return;

            clearInterval(intervalId);
            intervalId = setInterval(() => {
                victoryCount--;
                const timerEl = document.getElementById('victoryTimer');
                if (timerEl) {
                    const hrs = Math.floor(victoryCount / 3600).toString().padStart(2, '0');
                    const mins = Math.floor((victoryCount % 3600) / 60).toString().padStart(2, '0');
                    const secs = (victoryCount % 60).toString().padStart(2, '0');
                    timerEl.innerText = `${hrs}:${mins}:${secs}`;
                }
                if (victoryCount <= 0) {
                    clearInterval(intervalId);
                    showNotification('Délai de configuration de 48h expiré.', 'error');
                    window.logout();
                }
            }, 1000);
        }

        // ==================== RENDU DES VUES GENERIQUES ====================
        function renderLogin() {
            const t = translations[currentLang];
            return `
                <div class="header">
                    <div class="logo">${t.appName}</div>
                </div>
                <div class="card">
                    <h2 class="card-title">${t.login}</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label>${t.email}</label>
                            <input type="email" id="loginEmail" required>
                        </div>
                        <div class="form-group">
                            <label>${t.password}</label>
                            <div class="password-wrapper">
                                <input type="password" id="loginPassword" required>
                                <span class="toggle-password" onclick="window.togglePassword('loginPassword')">👁️</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">${t.login}</button>
                        <button type="button" class="btn btn-secondary" onclick="window.changeStep('register')">${t.register}</button>
                    </form>
                </div>`;
        }

        function renderRegister() {
            const t = translations[currentLang];
            return `
                <div class="header">
                    <div class="logo">${t.appName}</div>
                </div>
                <div class="card">
                    <h2 class="card-title">${t.register}</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label>${t.email}</label>
                            <input type="email" id="regEmail" required>
                        </div>
                        <div class="form-group">
                            <label>${t.whatsapp}</label>
                            <input type="tel" id="regWhatsapp" required placeholder="+243...">
                        </div>
                        <div class="form-group">
                            <label>${t.password}</label>
                            <div class="password-wrapper">
                                <input type="password" id="regPassword" required>
                                <span class="toggle-password" onclick="window.togglePassword('regPassword')">👁️</span>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>${t.confirmPassword}</label>
                            <div class="password-wrapper">
                                <input type="password" id="regConfirmPassword" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>${t.inviteCode}</label>
                            <input type="text" id="regInviteCode" required placeholder="ABCD1000">
                        </div>
                        <button type="submit" class="btn btn-primary">${t.submit}</button>
                        <button type="button" class="btn btn-secondary" onclick="window.changeStep('login')">${t.login}</button>
                    </form>
                </div>`;
        }

        function renderYoutubePopup() {
            return `
                <div class="popup-overlay">
                    <div class="popup-content black-bg">
                        <div class="red-title">⚠️ IMPORTANT ⚠️</div>
                        <div class="yellow-text">
                            <p>👍 Les likes et partages augmentent l'impact de l'équipe !</p>
                            <p>📈 Rejoignez la dynamique collective Point Focal.</p>
                        </div>
                        <div class="timer" id="popupTimer">10</div>
                        <button id="popupNextBtn" class="btn btn-primary" disabled>Continuer</button>
                    </div>
                </div>`;
        }

        function renderVideoStep() {
            const t = translations[currentLang];
            return `
                <div class="card">
                    <h2 class="card-title">🎬 ${t.watchVideo}</h2>
                    <div class="timer" id="videoTimer">200</div>
                    <div class="progress-bar"><div class="progress-fill" id="videoProgress" style="width: 0%"></div></div>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button class="btn btn-primary" onclick="window.open('https://www.youtube.com', '_blank')">📺 Lancer la vidéo</button>
                        <button id="nextAfterVideoBtn" class="btn btn-success" disabled>Suivant</button>
                    </div>
                </div>`;
        }

        function renderVictoryStep() {
            const isKM = currentUser?.inviteCode?.endsWith('KM');
            return `
                <div class="card">
                    <h2 class="card-title">🔗 Configuration Étape Victory</h2>
                    ${isKM ? '<div class="badge badge-km">👑 Mode Mopao KM Actif - Pas de limite de temps</div>' : `
                    <div class="timer" id="victoryTimer">48:00:00</div>`}
                    <p style="margin: 15px 0;">Procédez à l'enregistrement de votre transaction.</p>
                    <button id="nextToPaymentBtn" class="btn btn-primary">💰 Étape Paiement (2.03 USDT)</button>
                </div>`;
        }

        function renderPaymentForm() {
            const t = translations[currentLang];
            const isKM = currentUser?.inviteCode?.endsWith('KM');
            let hintLink = OPPORTUNITIES[0].link;

            return `
                <div class="card">
                    <h2 class="card-title">💳 Formulaire de paiement - 2.03 USDT (BSC)</h2>
                    <form id="paymentForm">
                        <div class="form-group">
                            <label>${t.victoryLink}</label>
                            <input type="text" id="victoryLink" value="${hintLink}" required>
                        </div>
                        <div class="form-group">
                            <label>${t.targetAddress}</label>
                            <input type="text" id="targetAddress" placeholder="0x..." required>
                        </div>
                        <div class="form-group">
                            <label>${t.transactionHash}</label>
                            <input type="text" id="transactionHash" placeholder="0x..." required>
                        </div>
                        <button type="submit" class="btn btn-success">Soumettre pour validation</button>
                    </form>
                    ${isKM ? `<button id="callMopaoBtn" class="btn btn-primary" style="margin-top:15px;">📞 Contacter Mopao via WhatsApp</button>` : ''}
                </div>`;
        }

        async function renderDashboard() {
            const t = translations[currentLang];
            const isKM = currentUser?.inviteCode?.endsWith('KM');
            let stats = { links: { public: 'Génération en attente', km: 'Indisponible' }, filleuls: [] };

            try {
                stats = await api.get('/user/dashboard');
            } catch(e) { console.log("Affichage des structures par défaut"); }

            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo">${t.appName} - Espace Membre</div>
                    <button class="btn btn-danger" onclick="window.logout()">${t.logout}</button>
                </div>
                <div class="dashboard-stats">
                    <div class="stat-card">
                        <h3>Mes Liens de Réseau</h3>
                        <p style="margin-top:10px;">Public : <b>${stats.links?.public || 'En validation'}</b></p>
                        ${isKM ? `<p>Lien KM : <b>${stats.links?.km || 'Axe Mopao actif'}</b></p>` : ''}
                    </div>
                    <div class="stat-card">
                        <h3>${t.yourFilleuls}</h3>
                        <div class="stat-value">${stats.filleuls ? stats.filleuls.length : 0}</div>
                    </div>
                </div>
                <div class="card">
                    <h3 class="card-title">Liens d'inscription cibles</h3>
                    <div class="opportunity-item">
                        <span>Lien d'adhésion direct :</span>
                        <a href="${OPPORTUNITIES[0].link}" target="_blank" class="btn btn-primary">Ouvrir le lien</a>
                    </div>
                </div>`;
        }

        // ==================== ROUTAGE GLO BAL ET INITIALISATION ====================
        async function render() {
            const app = document.getElementById('app');
            const token = localStorage.getItem('token');
            if (token && !currentUser) {
                currentUser = JSON.parse(localStorage.getItem('user'));
                currentStep = 'dashboard';
            }

            if (!currentUser) {
                app.innerHTML = currentStep === 'register' ? renderRegister() : renderLogin();
                document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
                document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
            } else if (currentStep === 'youtubePopup') {
                app.innerHTML = renderYoutubePopup();
                startYoutubeTimer();
            } else if (currentStep === 'video') {
                app.innerHTML = renderVideoStep();
                startVideoTimer();
            } else if (currentStep === 'victory') {
                app.innerHTML = renderVictoryStep();
                startVictoryTimer();
                const nextBtn = document.getElementById('nextToPaymentBtn');
                if (nextBtn) nextBtn.onclick = () => { currentStep = 'payment'; render(); };
            } else if (currentStep === 'payment') {
                app.innerHTML = renderPaymentForm();
                document.getElementById('paymentForm')?.addEventListener('submit', handlePaymentSubmit);
                const mopaoBtn = document.getElementById('callMopaoBtn');
                if (mopaoBtn) mopaoBtn.onclick = () => window.open('https://wa.me/243...', '_blank');
            } else {
                await renderDashboard();
            }
        }

        window.togglePassword = function(id) {
            const el = document.getElementById(id);
            if (el) el.type = el.type === 'password' ? 'text' : 'password';
        };
        window.changeStep = function(step) { currentStep = step; render(); };
        window.logout = function() {
            localStorage.clear();
            currentUser = null;
            currentStep = 'login';
            clearInterval(intervalId);
            render();
        };

        window.onload = render;
    </script>
</body>
</html>
