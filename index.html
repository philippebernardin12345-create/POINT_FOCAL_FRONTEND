<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POINT FOCAL - Accueil</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0B0E11;
            color: #EAECEF;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .welcome-card {
            background-color: #1E2329;
            padding: 50px 40px;
            border-radius: 4px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #2B3139;
        }
        .logo-space {
            font-size: 48px;
            color: #F0B90B;
            margin-bottom: 20px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #EAECEF;
        }
        p {
            color: #848E9C;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 35px;
        }
        .btn-gate {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #F0B90B;
            color: #000000;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            border-radius: 4px;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .btn-gate:hover {
            background-color: #FFE15D;
        }
    </style>
</head>
<body>

<div class="welcome-card">
    <div class="logo-space">🎯</div>
    <h1>Bienvenue sur Point Focal</h1>
    <p>Accédez à l'écosystème de croissance collective automatisé. Rejoignez la file d'attente globale ou connectez-vous à votre espace personnel.</p>
    
    <a href="#" id="gateWayBtn" class="btn-gate">Accéder à l'application</a>
</div>

<script>
    window.addEventListener('DOMContentLoaded', () => {
        const token = localStorage.getItem('token');
        const gateWayBtn = document.getElementById('gateWayBtn');
        
        if (token) {
            gateWayBtn.innerText = "Aller au Tableau de Bord";
            gateWayBtn.href = "dashboard.html";
        } else {
            gateWayBtn.innerText = "Commencer l'inscription";
            gateWayBtn.href = "register.html";
        }
    });
</script>
</body>
</html>
