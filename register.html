<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POINT FOCAL - Inscription</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">

<style>
body {
    background:#121212;
    color:#fff;
    font-family:Arial;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.auth-container {
    background:#1e1e1e;
    padding:25px;
    border-radius:10px;
    width:100%;
    max-width:420px;
}

h2 {
    color:#ffcc00;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0d0d0d;
    border:1px solid #333;
    color:white;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#ffcc00;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.box {
    display:none;
    margin-top:10px;
    padding:10px;
}
#error {color:red;}
#success {color:green;}
</style>
</head>

<body>

<div class="auth-container">
    <h2>Inscription Point Focal</h2>

    <form id="registerForm">

        <input id="email" type="email" placeholder="Email" required>

        <input id="whatsapp" type="tel" placeholder="WhatsApp" required>

        <input id="sponsor" type="text" placeholder="Code sponsor (obligatoire)" required>

        <input id="password" type="password" placeholder="Mot de passe" required>

        <input id="confirm" type="password" placeholder="Confirmer mot de passe" required>

        <button type="submit">S'inscrire</button>

        <div id="error" class="box"></div>
        <div id="success" class="box"></div>

    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

<script>
const API_URL = "https://point-focal.onrender.com/api/auth";

const phoneInput = document.querySelector("#whatsapp");
const iti = window.intlTelInput(phoneInput, {
    initialCountry: "cd",
    preferredCountries: ["cd","fr","be","cg"],
    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
});

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const errorBox = document.getElementById("error");
    const successBox = document.getElementById("success");

    errorBox.style.display = "none";
    successBox.style.display = "none";

    const email = document.getElementById("email").value;
    const whatsapp = iti.getNumber();
    const sponsor = document.getElementById("sponsor").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (password !== confirm) {
        errorBox.innerText = "Les mots de passe ne correspondent pas";
        errorBox.style.display = "block";
        return;
    }

    if (!iti.isValidNumber()) {
        errorBox.innerText = "Numéro WhatsApp invalide";
        errorBox.style.display = "block";
        return;
    }

    try {
        const res = await fetch(`${API_URL}/signup`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                whatsapp,
                password,
                sponsor
            })
        });

        const data = await res.json();

        if (res.ok) {
            successBox.innerText = "Inscription réussie. Vérifiez votre email.";
            successBox.style.display = "block";
            document.getElementById("registerForm").reset();
        } else {
            errorBox.innerText = data.message || "Erreur inscription";
            errorBox.style.display = "block";
        }

    } catch (err) {
        errorBox.innerText = "Erreur réseau : " + err.message;
        errorBox.style.display = "block";
    }
});
</script>

</body>
</html>
