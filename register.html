<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POINT FOCAL - Inscription</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0e11;
      color: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .auth-container {
      width: 100%;
      max-width: 460px;
      background: #1e2329;
      border: 1px solid #2b3139;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .lang-selector {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
    }

    .lang-btn {
      background: #2b3139;
      color: #b7bdc6;
      border: 1px solid #3a414b;
      border-radius: 8px;
      padding: 7px 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #f0b90b;
      color: #000;
      border-color: #f0b90b;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 800;
    }

    .subtitle-form {
      color: #848e9c;
      line-height: 1.5;
      margin-bottom: 26px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #b7bdc6;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #2b3139;
      background: #2b3139;
      color: #fff;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #f0b90b;
    }

    input[readonly] {
      opacity: 0.7;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 48px;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #f0b90b;
      cursor: pointer;
      font-size: 18px;
      user-select: none;
    }

    .btn-submit {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 15px;
      background: linear-gradient(135deg, #f0b90b, #d49c0a);
      color: #000;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      margin-top: 8px;
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .switch-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #848e9c;
    }

    .link-text {
      color: #f0b90b;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
    }

    .error-box {
      display: none;
      background: rgba(246, 70, 93, 0.12);
      border: 1px solid #f6465d;
      color: #f6465d;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 14px;
    }

    .success-box {
      display: none;
      background: rgba(14, 203, 129, 0.12);
      border: 1px solid #0ecb81;
      color: #0ecb81;
      padding: 14px;
      border-radius: 10px;
      margin-bottom: 20px;
      line-height: 1.5;
      font-size: 14px;
    }

    .iti {
      width: 100%;
    }

    .iti input {
      padding-left: 90px !important;
    }

    .forgot {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
    }

    #forgotPasswordBox {
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="lang-selector">
      <button class="lang-btn active" onclick="changeLanguage('FR', this)">FR</button>
      <button class="lang-btn" onclick="changeLanguage('EN', this)">EN</button>
      <button class="lang-btn" onclick="changeLanguage('ES', this)">ES</button>
      <button class="lang-btn" onclick="changeLanguage('PT', this)">PT</button>
      <button class="lang-btn" onclick="changeLanguage('AR', this)">AR</button>
      <button class="lang-btn" onclick="changeLanguage('HI', this)">HI</button>
    </div>

    <div id="errorBox" class="error-box"></div>
    <div id="successBox" class="success-box"></div>

    <h2 id="formTitle">Créer un compte</h2>
    <p id="formSubtitle" class="subtitle-form">
      Inscription obligatoire avec le code de votre parrain réel.
    </p>

    <form id="authForm">
      <div class="form-group">
        <label id="lblEmail">Adresse e-mail</label>
        <input type="email" id="email" required autocomplete="email">
      </div>

      <div class="form-group" id="whatsappGroup">
        <label id="lblWhatsapp">Numéro WhatsApp</label>
        <input type="tel" id="whatsapp" required autocomplete="tel">
      </div>

      <div class="form-group" id="sponsorGroup">
        <label id="lblSponsor">Code du parrain obligatoire</label>
        <input type="text" id="sponsor" required autocomplete="off">
      </div>

      <div class="form-group">
        <label id="lblPassword">Mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="password" required minlength="6" autocomplete="new-password">
          <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
        </div>
      </div>

      <div class="form-group" id="confirmGroup">
        <label id="lblConfirmPassword">Confirmer le mot de passe</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
          <span class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁</span>
        </div>
      </div>

      <button type="submit" id="btnSubmit" class="btn-submit">Créer mon compte</button>

      <div class="switch-link" id="switchText">
        Déjà membre ?
        <span class="link-text" onclick="toggleAuthMode()">Se connecter</span>
      </div>

      <div class="forgot">
        <span class="link-text" onclick="showForgotPasswordForm()">Mot de passe oublié ?</span>
      </div>

      <div id="forgotPasswordBox" style="display:none;">
        <div class="form-group">
          <label for="forgotEmail">Adresse e-mail du compte</label>
          <input type="email" id="forgotEmail" autocomplete="email" placeholder="exemple@email.com">
        </div>

        <button type="button" id="forgotPasswordBtn" class="btn-submit" onclick="handleForgotPassword()">
          Envoyer le lien de réinitialisation
        </button>

        <div class="forgot">
          <span class="link-text" onclick="hideForgotPasswordForm()">Retour</span>
        </div>
      </div>
    </form>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

        forgotSubtitle: "रिसेट लिंक प्राप्त करने के लिए अपना ईमेल दर्ज करें।",
        forgotEmail: "खाते का ईमेल पता",

        forgotBack: "वापस",

    const phoneInput = document.querySelector("#whatsapp");

    const iti = window.intlTelInput(phoneInput, {
      utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
      preferredCountries: ["cd", "cg", "fr", "be", "ca"],
      separateDialCode: true
    });

    // ----- FONCTIONS DE GESTION D'AFFICHAGE -----

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.innerText = message;
      box.style.display = "block";
      document.getElementById("successBox").style.display = "none";
    }

    function showSuccess(message) {
      const box = document.getElementById("successBox");
      box.innerText = message;
      box.style.display = "block";
      document.getElementById("errorBox").style.display = "none";
    }

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      input.type = input.type === "password" ? "text" : "password";
      icon.textContent = input.type === "password" ? "👁" : "🙈";
    }

    function changeLanguage(lang, btnElement) {
      currentLang = lang;

      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      btnElement.classList.add("active");
      updateTexts();
    }

    function updateTexts() {
      const t = translations[currentLang];

      document.getElementById("lblEmail").innerText = t.email;
      document.getElementById("lblWhatsapp").innerText = t.whatsapp;
      document.getElementById("lblSponsor").innerText = t.sponsor;
      document.getElementById("lblPassword").innerText = t.password;
      document.getElementById("lblConfirmPassword").innerText = t.confirmPassword;

      if (isRegisterMode) {
        document.getElementById("formTitle").innerText = t.titleReg;
        document.getElementById("formSubtitle").innerText = t.subtitleReg;
        document.getElementById("btnSubmit").innerText = t.btnReg;
        document.getElementById("switchText").innerHTML = t.switchReg;
      } else {
        document.getElementById("formTitle").innerText = t.titleLog;
        document.getElementById("formSubtitle").innerText = t.subtitleLog;
        document.getElementById("btnSubmit").innerText = t.btnLog;
        document.getElementById("switchText").innerHTML = t.switchLog;
      }
    }

    function toggleAuthMode() {
      isRegisterMode = !isRegisterMode;

      document.getElementById("errorBox").style.display = "none";
      document.getElementById("successBox").style.display = "none";
      
      // Cacher le formulaire de mot de passe oublié s'il est visible
      document.getElementById("forgotPasswordBox").style.display = "none";
      
      // Afficher tous les éléments du formulaire
      Array.from(document.getElementById("authForm").children).forEach((element) => {
        if (element.id !== "forgotPasswordBox") {
          element.style.display = "";
        }
      });

      document.getElementById("whatsappGroup").style.display = isRegisterMode ? "block" : "none";
      document.getElementById("sponsorGroup").style.display = isRegisterMode ? "block" : "none";
      document.getElementById("confirmGroup").style.display = isRegisterMode ? "block" : "none";

      document.getElementById("whatsapp").required = isRegisterMode;
      document.getElementById("sponsor").required = isRegisterMode;
      document.getElementById("confirmPassword").required = isRegisterMode;

      updateTexts();
    }

    // ----- FONCTIONS MOT DE PASSE OUBLIÉ -----

    function showForgotPasswordForm() {
      const forgotBox = document.getElementById("forgotPasswordBox");
      const authForm = document.getElementById("authForm");
      const email = document.getElementById("email").value.trim();

      document.getElementById("errorBox").style.display = "none";
      document.getElementById("successBox").style.display = "none";

      // Pré-remplir l'email avec celui déjà saisi
      if (email) {
        document.getElementById("forgotEmail").value = email;
      }

      // Cacher les autres éléments du formulaire
      Array.from(authForm.children).forEach((element) => {
        if (element.id !== "forgotPasswordBox") {
          element.style.display = "none";
        }
      });

      forgotBox.style.display = "block";
      
      // Focus sur le champ email du formulaire de récupération
      document.getElementById("forgotEmail").focus();
    }

    function hideForgotPasswordForm() {
      const forgotBox = document.getElementById("forgotPasswordBox");
      const authForm = document.getElementById("authForm");

      forgotBox.style.display = "none";

      // Réafficher tous les éléments du formulaire
      Array.from(authForm.children).forEach((element) => {
        element.style.display = "";
      });

      // Restaurer la visibilité correcte en fonction du mode
      document.getElementById("whatsappGroup").style.display = isRegisterMode ? "block" : "none";
      document.getElementById("sponsorGroup").style.display = isRegisterMode ? "block" : "none";
      document.getElementById("confirmGroup").style.display = isRegisterMode ? "block" : "none";
      
      // Effacer le champ de récupération et les messages
      document.getElementById("forgotEmail").value = "";
    }

    async function handleForgotPassword() {
      const t = translations[currentLang];
      const email = document.getElementById("forgotEmail").value.trim();
      const btn = document.getElementById("forgotPasswordBtn");

      document.getElementById("errorBox").style.display = "none";
      document.getElementById("successBox").style.display = "none";

      if (!email) {
        showError(t.forgotEmptyEmail || "Veuillez saisir votre adresse e-mail.");
        return;
      }

      btn.disabled = true;
      btn.textContent = "Envoi en cours...";

      try {
        const response = await fetch(`${BASE_API}/forgot-password`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email })
        });

        const data = await response.json().catch(() => ({
          message: "Réponse serveur invalide."
        }));

        if (!response.ok) {
          showError(data.message || data.error || t.forgotError || "Impossible d'envoyer le lien de réinitialisation.");
          btn.disabled = false;
          btn.textContent = t.forgotBtn || "Envoyer le lien de réinitialisation";
          return;
        }

        showSuccess(data.message || t.forgotSuccess || "Un lien de réinitialisation a été envoyé à votre adresse e-mail.");
        document.getElementById("forgotEmail").value = "";

        // Retour au formulaire après un délai
        setTimeout(() => {
          hideForgotPasswordForm();
        }, 3000);

      } catch (error) {
        console.error("Erreur mot de passe oublié :", error);
        showError("Erreur réseau. Attendez quelques secondes puis réessayez.");
      } finally {
        btn.disabled = false;
        btn.textContent = t.forgotBtn || "Envoyer le lien de réinitialisation";
      }
    }

    // ----- GESTION DU SPONSOR -----

    window.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const sponsorParam = urlParams.get("ref") || urlParams.get("sponsor") || "ABCD1000";

      const sponsorField = document.getElementById("sponsor");
      sponsorField.value = sponsorParam.toUpperCase();
      sponsorField.readOnly = true;
    });

    // ----- SOUMISSION DU FORMULAIRE -----

    document.getElementById("authForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const t = translations[currentLang];

      document.getElementById("errorBox").style.display = "none";
      document.getElementById("successBox").style.display = "none";

      const btn = document.getElementById("btnSubmit");
      btn.disabled = true;

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      let sponsorCode = document.getElementById("sponsor").value.trim().toUpperCase();

      if (!sponsorCode) {
        sponsorCode = "ABCD1000";
        document.getElementById("sponsor").value = sponsorCode;
      }

      try {
        if (isRegisterMode) {
          let whatsapp = phoneInput.value.trim();
          whatsapp = whatsapp.replace(/\s+/g, "").replace("+", "");

          if (whatsapp.startsWith("0")) {
            whatsapp = "243" + whatsapp.slice(1);
          }

          if (!whatsapp.startsWith("243")) {
            whatsapp = "243" + whatsapp;
          }

          if (!/^243[0-9]{9}$/.test(whatsapp)) {
            showError(t.invalidPhone);
            btn.disabled = false;
            return;
          }

          if (password !== confirmPassword) {
            showError(t.passwordMismatch);
            btn.disabled = false;
            return;
          }

          const res = await fetch(`${BASE_API}/register`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email,
              whatsapp,
              password,
              confirmPassword,
              invitationCode: sponsorCode,
              language: currentLang.toLowerCase()
            })
          });

          const data = await res.json().catch(() => ({
            message: "Réponse serveur invalide."
          }));

          if (!res.ok) {
            showError(data.message || "Erreur lors de la création du compte.");
            btn.disabled = false;
            return;
          }

          if (data.token) {
            localStorage.setItem("token", data.token);
          }

          if (data.user) {
            localStorage.setItem("user", JSON.stringify(data.user));
          }

          localStorage.setItem("pendingEmail", email);

          showSuccess("Inscription réussie. Un code OTP a été envoyé à votre adresse e-mail.");

          setTimeout(() => {
            window.location.href = "confirm-otp.html";
          }, 1000);

          btn.disabled = false;
          return;
        } else {
          // Mode connexion
          const res = await fetch(`${BASE_API}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              email,
              password
            })
          });

          const data = await res.json();

          if (!res.ok) {
            showError(data.message || "Identifiants incorrects.");
            btn.disabled = false;
            return;
          }

          if (data.token) {
            localStorage.setItem("token", data.token);
          }

          if (data.user) {
            localStorage.setItem("user", JSON.stringify(data.user));
          }

          showSuccess(data.message || "Connexion réussie.");

          setTimeout(() => {
            window.location.href = "popup-youtube.html";
          }, 1000);
        }
      } catch (err) {
        showError(t.serverError);
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
