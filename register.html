<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation d'Ancrage - Point Focal V6</title>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f4f6f9; color: #333; }
        .container { max-width: 500px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1e3a8a; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 14px; background-color: #1e3a8a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        button:disabled { background-color: #aaa; }
        #status-box { padding: 12px; border-radius: 6px; margin-top: 15px; font-weight: bold; text-align: center; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Vérification d'Ancrage Système</h2>
        <p style="font-size: 0.85rem; color: #666; text-align: center; margin-bottom: 25px;">
            Soumettez les identifiants de votre transaction publique (BSC BEP-20) pour que le robot vérifie la conformité de votre liaison.
        </p>

        <form id="registerForm">
            <div class="input-group">
                <label>Adresse E-mail du compte *</label>
                <input type="email" id="email" placeholder="exemple@mail.com" required />
            </div>

            <div class="input-group">
                <label>Numéro WhatsApp (Optionnel)</label>
                <input type="text" id="whatsapp" placeholder="+243..." />
            </div>

            <div class="input-group">
                <label>Votre Portefeuille d'Envoi (BSC) *</label>
                <input type="text" id="wallet" placeholder="0x..." required />
            </div>

            <div class="input-group">
                <label>Hachage de la Transaction à vérifier (TxHash) *</label>
                <input type="text" id="txHash" placeholder="Collez le hash à 66 caractères" required />
            </div>

            <button type="submit" id="btnSubmit">Lancer la vérification automatique</button>
        </form>

        <div id="status-box"></div>
    </div>

    <script>
        const API_URL = "https://point-focal-backend.onrender.com/api";
        const form = document.getElementById('registerForm');
        const btn = document.getElementById('btnSubmit');
        const statusBox = document.getElementById('status-box');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                email: document.getElementById('email').value,
                whatsapp: document.getElementById('whatsapp').value,
                wallet: document.getElementById('wallet').value,
                txHash: document.getElementById('txHash').value
            };

            btn.disabled = true;
            btn.innerText = "⏳ Scan de la Blockchain en cours...";
            statusBox.style.display = "block";
            statusBox.style.backgroundColor = "#e2e3e5";
            statusBox.style.color = "#383d41";
            statusBox.innerText = "Interrogation des nœuds du réseau BSC...";

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    statusBox.style.backgroundColor = "#d4edda";
                    statusBox.style.color = "#155724";
                    statusBox.innerText = "✅ Transaction validée par le nœud ! Liaison active.";
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 2000);
                } else {
                    statusBox.style.backgroundColor = "#f8d7da";
                    statusBox.style.color = "#721c24";
                    statusBox.innerText = `❌ Rejet : ${data.error || 'Aucune transaction correspondante trouvée'}`;
                    btn.disabled = false;
                    btn.innerText = "Lancer la vérification automatique";
                }
            } catch (err) {
                statusBox.style.backgroundColor = "#fff3cd";
                statusBox.style.color = "#856404";
                statusBox.innerText = "⚠️ Échec de synchronisation. Réessayez dans quelques secondes.";
                btn.disabled = false;
                btn.innerText = "Recommencer";
            }
        });
    </script>
</body>
</html>
