<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POINT FOCAL - Inscription & Connexion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0B0E11; /* Anthracite profond Binance */
            color: #EAECEF; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        .auth-container { 
            background-color: #1E2329; /* Couleur des conteneurs Binance */
            padding: 40px 30px; 
            border-radius: 4px; 
            max-width: 450px; 
            width: 100%; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
        }
        .lang-selector { display: flex; justify-content: flex-end; gap: 6px; margin-bottom: 25px; }
        .lang-btn { 
            background-color: #2B3139; 
            color: #848E9C; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 12px; 
            font-weight: 600;
        }
        .lang-btn.active { background-color: #F0B90B; color: #000000; }
        h2 { margin-bottom: 25px; color: #EAECEF; font-size: 24px; font-weight: 600; text-align: left; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 14px; color: #848E9C; }
        input { 
            width: 100%; 
            padding: 12px; 
            background-color: #2B3139; 
            border: 1px solid #2B3139; 
            color: #EAECEF; 
            border-radius: 4px; 
            font-size: 14px; 
            transition: all 0.2s;
        }
        input:focus { border-color: #F0B90B; outline: none; }
        .iti { width: 100%; }
        .iti__clickable-country-list { background-color: #2B3139; border-color: #474D57; }
        button.btn-submit { 
            width: 100%; 
            padding: 14px; 
            background-color: #F0B90B; 
            color: #000000; 
            border: none; 
            border-radius: 4px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer; 
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button.btn-submit:hover { background-color: #FFE15D; }
        .toggle-link { margin-top: 20px; font-size: 14px; color: #F0B90B; cursor: pointer; display: block; text-align: left; font-weight: 500; }
        .toggle-link:hover { color: #FFE15D; }
        .error-box { background-color: rgba(234,57,67,0.1); border-left: 4px solid #EA3943; color: #EA3943; padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; display: none; text-align: left; }
        .success-box { background-color: rgba(2,192,118,0.1); border-left: 4px solid #02C076; color: #02C076; padding: 25px; border-radius: 4px; font-size: 14px; display: none; text-align: left; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="lang-selector">
        <button class="lang-btn active">FR</button>
        <button class="lang-btn">EN</button>
        <button class="lang-btn">ES</button>
        <button class="lang-btn">PT</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div id="authSection">
        <h2 id="formTitle">Créer un compte</h2>
        <form id="authForm">
            <div class="form-group">
                <label>Adresse e-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group" id="whatsappGroup">
                <label>Numéro WhatsApp</label>
                <input type="tel" id="whatsapp" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group" id="confirmPasswordGroup">
                <label>Confirmation du mot de passe</label>
                <input type="password" id="confirmPassword">
            </div>
            <div class="form-group" id="sponsorGroup">
                <label>Code d'invitation obligatoire</label>
                <input type="text" id="sponsorCode">
            </div>
            <button type="submit" class="btn-submit" id="btnSubmit">S'inscrire</button>
        </form>
        <span class="toggle-link" id="toggleAuth" onclick="toggleForm()">Déjà inscrit ? Se connecter</span>
    </div>

    <div id="verifyEmailSection" class="success-box">
        <h3 style="margin-bottom: 10px; font-size: 18px;">📧 Validation requise</h3>
        <p style="line-height: 1.5; margin-bottom: 15px;">Un e-mail de confirmation vous a été envoyé. Veuillez cliquer sur le lien d'activation présent dans le message afin d'accéder à l'application.</p>
        <button class="btn-submit" onclick="window.location.reload()">Retourner à la connexion</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script>
    const BASE_API = "https://point-focal-backend.onrender.com/api";
    let isRegister = true;
    
    const phoneInput = window.intlTelInput(document.getElementById("whatsapp"), {
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        preferredCountries: ["fr", "ci", "sn", "cm"]
    });

    function toggleForm() {
        isRegister = !isRegister;
        document.getElementById("errorBox").style.display = "none";
        document.getElementById("formTitle").innerText = isRegister ? "Créer un compte" : "Se connecter";
        document.getElementById("whatsappGroup").style.display = isRegister ? "block" : "none";
        document.getElementById("confirmPasswordGroup").style.display = isRegister ? "block" : "none";
        document.getElementById("sponsorGroup").style.display = isRegister ? "block" : "none";
        document.getElementById("btnSubmit").innerText = isRegister ? "S'inscrire" : "Se connecter";
        document.getElementById("toggleAuth").innerText = isRegister ? "Déjà inscrit ? Se connecter" : "Pas encore de compte ? S'inscrire";
        
        if (isRegister) {
            document.getElementById("whatsapp").setAttribute("required", "required");
        } else {
            document.getElementById("whatsapp").removeAttribute("required");
        }
    }

    document.getElementById("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errBox = document.getElementById("errorBox");
        errBox.style.display = "none";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (isRegister) {
            const confirmPassword = document.getElementById("confirmPassword").value;
            const sponsor = document.getElementById("sponsorCode").value.trim();
            const whatsapp = phoneInput.getNumber();

            if (!phoneInput.isValidNumber()) {
                errBox.innerText = "Format de numéro WhatsApp incorrect.";
                errBox.style.display = "block";
                return;
            }
            if (password !== confirmPassword) {
                errBox.innerText = "Les mots de passe saisis ne sont pas identiques.";
                errBox.style.display = "block";
                return;
            }
            if (!sponsor) {
                errBox.innerText = "Le code d'invitation est obligatoire.";
                errBox.style.display = "block";
                return;
            }

            try {
                const res = await fetch(`${BASE_API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, whatsapp, password, sponsor })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById("authSection").style.display = "none";
                    document.getElementById("verifyEmailSection").style.display = "block";
                } else {
                    errBox.innerText = data.message || "Erreur d'inscription.";
                    errBox.style.display = "block";
                }
            } catch (err) {
                errBox.innerText = "Erreur technique serveur.";
                errBox.style.display = "block";
            }
        } else {
            try {
                const res = await fetch(`${BASE_API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = "popup-youtube.html";
                } else {
                    errBox.innerText = data.message || "Identifiants invalides ou e-mail non vérifié.";
                    errBox.style.display = "block";
                }
            } catch (err) {
                errBox.innerText = "Connexion impossible.";
                errBox.style.display = "block";
            }
        }
    });
</script>
</body>
</html>
