<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POINT FOCAL - Inscription</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.7); max-width: 400px; width: 100%; text-align: center; }
        .lang-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .lang-btn { background-color: #252525; color: #ffffff; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .lang-btn.active { background-color: #00cc44; border-color: #00cc44; }
        h2 { margin-bottom: 20px; color: #00cc44; text-transform: uppercase; font-size: 20px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaaaaa; }
        input { width: 100%; padding: 10px; background-color: #252525; border: 1px solid #444; color: #ffffff; border-radius: 6px; font-size: 14px; }
        input:focus { border-color: #00cc44; outline: none; }
        .iti { width: 100%; }
        button.btn-submit { width: 100%; padding: 12px; background-color: #00cc44; color: #ffffff; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }
        button.btn-submit:hover { background-color: #00aa3a; }
        .toggle-link { margin-top: 15px; font-size: 13px; color: #aaaaaa; cursor: pointer; display: block; }
        .toggle-link:hover { color: #00cc44; }
        .error-box { background-color: rgba(255,51,51,0.1); border: 1px solid #ff3333; color: #ff8888; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; display: none; }
        .success-box { background-color: rgba(0,204,68,0.1); border: 1px solid #00cc44; color: #a3e635; padding: 15px; border-radius: 6px; font-size: 14px; display: none; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="lang-selector">
        <button class="lang-btn active">FR</button>
        <button class="lang-btn">EN</button>
        <button class="lang-btn">ES</button>
        <button class="lang-btn">PT</button>
    </div>

    <div id="errorBox" class="error-box"></div>

    <div id="authSection">
        <h2 id="formTitle">Inscription</h2>
        <form id="authForm">
            <div class="form-group">
                <label>Adresse e-mail</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group" id="whatsappGroup">
                <label>Numéro WhatsApp</label>
                <input type="tel" id="whatsapp" required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group" id="confirmPasswordGroup">
                <label>Confirmation du mot de passe</label>
                <input type="password" id="confirmPassword">
            </div>
            <div class="form-group" id="sponsorGroup">
                <label>Code d'invitation obligatoire</label>
                <input type="text" id="sponsorCode">
            </div>
            <button type="submit" class="btn-submit" id="btnSubmit">S'inscrire</button>
        </form>
        <span class="toggle-link" id="toggleAuth" onclick="toggleForm()">Déjà inscrit ? Se connecter</span>
    </div>

    <div id="verifyEmailSection" class="success-box">
        <h3>📧 Validation Requise</h3>
        <p>Un e-mail de confirmation vous a été envoyé. Veuillez cliquer sur le lien présent dans le message pour valider votre compte, puis connectez-vous.</p>
        <button class="btn-submit" onclick="window.location.reload()">Aller à la connexion</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script>
    const BASE_API = "https://point-focal-backend.onrender.com/api";
    let isRegister = true;
    
    const phoneInput = window.intlTelInput(document.getElementById("whatsapp"), {
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        preferredCountries: ["fr", "ci", "sn", "cm", "be"]
    });

    function toggleForm() {
        isRegister = !isRegister;
        const errBox = document.getElementById("errorBox");
        errBox.style.display = "none";

        document.getElementById("formTitle").innerText = isRegister ? "Inscription" : "Connexion";
        document.getElementById("whatsappGroup").style.display = isRegister ? "block" : "none";
        document.getElementById("confirmPasswordGroup").style.display = isRegister ? "block" : "none";
        document.getElementById("sponsorGroup").style.display = isRegister ? "block" : "none";
        document.getElementById("btnSubmit").innerText = isRegister ? "S'inscrire" : "Se connecter";
        document.getElementById("toggleAuth").innerText = isRegister ? "Déjà inscrit ? Se connecter" : "Pas de compte ? S'inscrire";
        
        if(isRegister) {
            document.getElementById("whatsapp").setAttribute("required", "required");
        } else {
            document.getElementById("whatsapp").removeAttribute("required");
        }
    }

    document.getElementById("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errBox = document.getElementById("errorBox");
        errBox.style.display = "none";

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        if (isRegister) {
            const confirmPassword = document.getElementById("confirmPassword").value;
            const sponsor = document.getElementById("sponsorCode").value.trim();
            const whatsapp = phoneInput.getNumber();

            if (!phoneInput.isValidNumber()) {
                errBox.innerText = "Numéro WhatsApp invalide.";
                errBox.style.display = "block";
                return;
            }
            if (password !== confirmPassword) {
                errBox.innerText = "Les mots de passe ne correspondent pas.";
                errBox.style.display = "block";
                return;
            }
            if (!sponsor) {
                errBox.innerText = "Le code d'invitation est strictement obligatoire.";
                errBox.style.display = "block";
                return;
            }

            try {
                const res = await fetch(`${BASE_API}/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, whatsapp, password, sponsor })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById("authSection").style.display = "none";
                    document.getElementById("verifyEmailSection").style.display = "block";
                } else {
                    errBox.innerText = data.message || "Erreur d'inscription.";
                    errBox.style.display = "block";
                }
            } catch (err) {
                errBox.innerText = "Erreur de serveur.";
                errBox.style.display = "block";
            }
        } else {
            try {
                const res = await fetch(`${BASE_API}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    // RÈGLE INVIOLABLE : Redirection obligatoire vers le popup d'avertissement 10s
                    window.location.href = "popup-youtube.html";
                } else {
                    errBox.innerText = data.message || "Identifiants incorrects ou e-mail non validé.";
                    errBox.style.display = "block";
                }
            } catch (err) {
                errBox.innerText = "Erreur de connexion.";
                errBox.style.display = "block";
            }
        }
    });
</script>
</body>
</html>
