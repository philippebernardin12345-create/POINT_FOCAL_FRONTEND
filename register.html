<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POINT FOCAL - Inscription</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">

<style>
body {
    background:#121212;
    color:#fff;
    font-family:Arial;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.auth-container {
    background:#1e1e1e;
    padding:25px;
    border-radius:10px;
    width:100%;
    max-width:420px;
}

h2 {
    color:#ffcc00;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0d0d0d;
    border:1px solid #333;
    color:white;
    box-sizing:border-box;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#ffcc00;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

.box {
    display:none;
    margin-top:10px;
    padding:10px;
    border-radius:5px;
    font-size:14px;
}

#error {
    background-color: rgba(255, 51, 51, 0.1);
    color:#ff3333;
    border:1px solid #ff3333;
}

#success {
    background-color: rgba(0, 204, 68, 0.1);
    color:#00cc44;
    border:1px solid #00cc44;
}

.debug-info {
    display:none;
    background:#0a0a0a;
    color:#888;
    padding:10px;
    margin-top:10px;
    font-size:11px;
    border:1px solid #333;
    border-radius:5px;
    max-height:150px;
    overflow-y:auto;
    font-family:monospace;
}

.debug-info.show {
    display:block;
}
</style>
</head>

<body>

<div class="auth-container">
    <h2>Inscription Point Focal</h2>

    <form id="registerForm">

        <input id="email" type="email" placeholder="Email" required>

        <input id="whatsapp" type="tel" placeholder="WhatsApp" required>

        <input id="sponsor" type="text" placeholder="Code sponsor (obligatoire)" required>

        <input id="password" type="password" placeholder="Mot de passe" required>

        <input id="confirm" type="password" placeholder="Confirmer mot de passe" required>

        <button type="submit">S'inscrire</button>

        <div id="error" class="box"></div>
        <div id="success" class="box"></div>
        <div id="debugInfo" class="debug-info"></div>

    </form>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>

<script>
// ✅ CONFORMITÉ CAHIER DES CHARGES 09/06 - BACKEND RENDER
const API_URL = "https://point-focal-backend.onrender.com/api/auth";

// DEBUG MODE - À mettre à false en production
const DEBUG_MODE = true;

function logDebug(msg, data) {
    const debugBox = document.getElementById("debugInfo");
    const timestamp = new Date().toLocaleTimeString();
    let text = `[${timestamp}] ${msg}`;
    if (data) {
        text += `\n${JSON.stringify(data, null, 2)}`;
    }
    debugBox.innerText += text + "\n---\n";
    debugBox.classList.add("show");
    console.log(msg, data);
}

const phoneInput = document.querySelector("#whatsapp");
const iti = window.intlTelInput(phoneInput, {
    initialCountry: "cd",
    preferredCountries: ["cd","fr","be","cg"],
    utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
});

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const errorBox = document.getElementById("error");
    const successBox = document.getElementById("success");
    const debugBox = document.getElementById("debugInfo");

    errorBox.style.display = "none";
    successBox.style.display = "none";
    debugBox.innerText = "";

    const email = document.getElementById("email").value;
    const whatsapp = iti.getNumber();
    const sponsor = document.getElementById("sponsor").value;
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;

    if (DEBUG_MODE) {
        logDebug("📝 Données du formulaire :", {
            email,
            whatsapp,
            sponsor,
            passwordLength: password.length
        });
    }

    // VALIDATION CLIENT
    if (password !== confirm) {
        errorBox.innerText = "❌ Les mots de passe ne correspondent pas";
        errorBox.style.display = "block";
        if (DEBUG_MODE) logDebug("Erreur validation : mots de passe différents");
        return;
    }

    if (!iti.isValidNumber()) {
        errorBox.innerText = "❌ Numéro WhatsApp invalide";
        errorBox.style.display = "block";
        if (DEBUG_MODE) logDebug("Erreur validation : WhatsApp invalide", { whatsapp });
        return;
    }

    if (!email.includes("@")) {
        errorBox.innerText = "❌ Email invalide";
        errorBox.style.display = "block";
        if (DEBUG_MODE) logDebug("Erreur validation : email invalide", { email });
        return;
    }

    if (!sponsor || sponsor.trim() === "") {
        errorBox.innerText = "❌ Code sponsor obligatoire";
        errorBox.style.display = "block";
        if (DEBUG_MODE) logDebug("Erreur validation : sponsor vide");
        return;
    }

    try {
        if (DEBUG_MODE) logDebug("🚀 Envoi requête vers : " + API_URL + "/signup");

        const payload = {
            email,
            whatsapp,
            password,
            sponsor
        };

        if (DEBUG_MODE) logDebug("📦 Payload envoyé :", payload);

        const res = await fetch(`${API_URL}/signup`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        if (DEBUG_MODE) logDebug("📡 Réponse reçue", {
            status: res.status,
            statusText: res.statusText,
            headers: {
                contentType: res.headers.get("content-type"),
                corsOrigin: res.headers.get("Access-Control-Allow-Origin")
            }
        });

        let data;
        try {
            data = await res.json();
            if (DEBUG_MODE) logDebug("✅ JSON parsé :", data);
        } catch (jsonErr) {
            const text = await res.text();
            if (DEBUG_MODE) logDebug("❌ JSON invalide, réponse brute :", text);
            throw new Error("Réponse serveur invalide (pas du JSON)");
        }

        if (res.ok) {
            successBox.innerText = "✅ Inscription réussie ! Vérifiez votre email.";
            successBox.style.display = "block";
            document.getElementById("registerForm").reset();
            if (DEBUG_MODE) logDebug("🎉 Inscription réussie !");
        } else {
            const errorMsg = data.message || data.error || "Erreur inscription";
            errorBox.innerText = "❌ " + errorMsg;
            errorBox.style.display = "block";
            if (DEBUG_MODE) logDebug("❌ Erreur serveur :", { status: res.status, message: errorMsg });
        }

    } catch (err) {
        const errorMsg = err.message || "Erreur réseau";
        errorBox.innerText = "❌ Erreur : " + errorMsg;
        errorBox.style.display = "block";
        
        if (DEBUG_MODE) {
            logDebug("💥 Exception attrapée :", {
                message: err.message,
                stack: err.stack,
                type: err.constructor.name
            });
            logDebug("🔗 Vérifiez : L'URL API est-elle correcte ?", { API_URL });
            logDebug("🔗 Vérifiez : Le backend Render est-il actif ?");
            logDebug("🔗 Vérifiez : CORS est-il configuré sur le backend ?");
        }
    }
});

// Info au chargement
if (DEBUG_MODE) {
    logDebug("✅ App chargée - Mode DEBUG activé");
    logDebug("🔗 API URL configurée :", { API_URL });
}
</script>

</body>
</html>
