<script>
        // On cible la route d'authentification sectorisée de ton architecture src/routes/auth.js
        const API_URL = "https://point-focal-backend.onrender.com/api/auth";
        const form = document.getElementById('signupForm');
        const btn = document.getElementById('btnSubmit');
        const errorBox = document.getElementById('error-box');
        const successBox = document.getElementById('success-box');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorBox.style.display = "none";
            successBox.style.display = "none";

            const email = document.getElementById('email').value.trim();
            const whatsapp = document.getElementById('whatsapp').value.trim();
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const inviteCode = document.getElementById('inviteCode').value.trim().toUpperCase();

            if (password !== passwordConfirm) {
                showError("❌ Les deux mots de passe ne correspondent pas.");
                return;
            }

            const inviteRegex = /^[A-Z]{4}[0-9]{4}$/;
            if (!inviteRegex.test(inviteCode)) {
                showError("❌ Code d'invitation invalide (Format requis : 4 lettres + 4 chiffres).");
                return;
            }

            const payload = { email, whatsapp, password, inviteCode };

            btn.disabled = true;
            btn.innerText = "⏳ Inscription en cours...";

            try {
                // Appel direct à la route d'inscription du contrôleur auth.js
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    successBox.style.display = "block";
                    successBox.innerText = "✅ Compte enregistré ! Veuillez valider votre e-mail pour activer le Popup YouTube Éducatif.";
                    form.reset();
                    btn.disabled = false;
                    btn.innerText = "Créer mon compte";
                } else {
                    showError(`❌ Rejet du serveur : ${data.error || data.message || "Données non conformes"}`);
                    btn.disabled = false;
                    btn.innerText = "Créer mon compte";
                }
            } catch (err) {
                // Si ça plante, on affiche l'erreur technique pour savoir si c'est un problème de CORS ou d'URL
                showError(`⚠️ Liaison impossible. Vérifiez que le backend Render est actif ou réessayez dans 10 secondes.`);
                btn.disabled = false;
                btn.innerText = "Créer mon compte";
            }
        });

        function showError(msg) {
            errorBox.style.display = "block";
            errorBox.innerText = msg;
        }
    </script>
