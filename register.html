<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POINT FOCAL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        body { background-color: #121212; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-container { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.7); max-width: 400px; width: 100%; text-align: center; box-sizing: border-box; }
        .lang-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .lang-btn { background-color: #252525; color: #ffffff; border: 1px solid #444; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .lang-btn.active { background-color: #ffcc00; color: #000000; border-color: #ffcc00; }
        h2 { color: #ffcc00; margin-bottom: 20px; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; text-align: left; position: relative; }
        input { width: 100%; padding: 12px; border: 1px solid #333; background-color: #0d0d0d; color: #fff; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: #ffcc00; outline: none; }
        input:disabled, input[readonly] { background-color: #1a1a1a; color: #888; border-color: #222; cursor: not-allowed; }
        .iti { width: 100%; }
        .iti__country-list { background-color: #1e1e1e; color: #fff; }
        .toggle-password { position: absolute; right: 12px; top: 38%; cursor: pointer; font-size: 14px; color: #ffcc00; user-select: none; }
        button { width: 100%; background-color: #ffcc00; color: #000; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        .switch-link { margin-top: 15px; font-size: 14px; color: #aaaaaa; }
        .switch-link span { color: #ffcc00; cursor: pointer; text-decoration: underline; }
        .forgot-password { display: block; text-align: right; font-size: 13px; color: #ffcc00; margin-top: 5px; cursor: pointer; text-decoration: underline; }
        .box { margin-top: 15px; padding: 10px; border-radius: 6px; font-weight: bold; display: none; }
        #error-box { background-color: rgba(255, 51, 51, 0.1); color: #ff3333; }
        #success-box { background-color: rgba(0, 204, 68, 0.1); color: #00cc44; }
        #logoutSection, #verifyEmailSection { display: none; }
        .email-icon { font-size: 48px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>

<div class="auth-container" id="authSection">
    <div class="lang-selector">
        <button class="lang-btn" id="btn-fr" onclick="changerLangue('fr')">FR</button>
        <button class="lang-btn" id="btn-en" onclick="changerLangue('en')">EN</button>
        <button class="lang-btn" id="btn-es" onclick="changerLangue('es')">ES</button>
        <button class="lang-btn" id="btn-pt" onclick="changerLangue('pt')">PT</button>
    </div>

    <h2 id="formTitle">Inscription</h2>
    
    <form id="authForm">
        <div class="form-group" id="sponsorGroup">
            <input id="sponsorCode" type="text" required autocomplete="off">
        </div>
        <div class="form-group"><input id="email" type="email" required></div>
        <div class="form-group" id="whatsappGroup"><input id="whatsapp" type="tel" required></div>
        <div class="form-group">
            <input id="password" type="password" required>
            <span class="toggle-password" onclick="togglePasswordVisibility('password')">👁️</span>
            <span class="forgot-password" id="forgotPwdLink" onclick="showForgotPasswordForm()"></span>
        </div>
        <div class="form-group" id="confirmPasswordGroup">
            <input id="confirmPassword" type="password">
            <span class="toggle-password" onclick="togglePasswordVisibility('confirmPassword')">👁️</span>
        </div>
        <button id="btnSubmit" type="submit"></button>
    </form>
    <div id="switchAuth" class="switch-link" onclick="handleSwitchAuth(event)"></div>
    <div id="error-box" class="box"></div>
    <div id="success-box" class="box"></div>
</div>

<div class="auth-container" id="verifyEmailSection">
    <span class="email-icon">📩</span>
    <h2 id="verifyTitle">Vérifiez votre boîte mail</h2>
    <p style="font-size: 15px; color: #aaa; line-height: 1.5; margin-bottom: 20px;" id="verifyDesc">Un lien de confirmation vient de vous être envoyé. Veuillez cliquer dessus pour activer votre compte Point Focal.</p>
    <button onclick="window.location.href='login.html'" id="btnGoToLogin">Aller à la page de connexion</button>
</div>

<div class="auth-container" id="logoutSection">
    <h2 id="txt-logout-title"></h2>
    <p id="txt-logout-desc"></p>
    <button onclick="executerDeconnexion()" style="background-color: #ff3333; color: white;" id="btn-logout"></button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script>
    const API_URL = "https://point-focal-backend.onrender.com/api/auth";
    let currentMode = "signup";
    let langueActive = "fr";

    const lexique = {
        fr: { signupTitle: "Inscription Point Focal", loginTitle: "Connexion Point Focal", forgotTitle: "Récupération", invitationCodePh: "Code d'invitation (Obligatoire)", emailPh: "Adresse E-mail", passwordPh: "Mot de passe", confirmPasswordPh: "Confirmation du mot de passe", forgotLink: "Mot de passe oublié ?", btnSignup: "S'inscrire", btnLogin: "Se connecter", btnForgot: "Envoyer le lien", switchLogin: "Déjà un compte ? <span>Connectez-vous</span>", switchSignup: "Pas de compte ? <span>Inscrivez-vous</span>", back: "<span>Retour</span>", errorMdp: "Les mots de passe ne correspondent pas.", errorTel: "Numéro WhatsApp invalide.", logoutTitle: "Votre Session", logoutDesc: "Vous êtes déjà connecté.", btnLogout: "Se Déconnecter", successReset: "E-mail de récupération envoyé !", verifyTitle: "Vérifiez vos e-mails", verifyDesc: "Un lien de confirmation vous a été envoyé. Veuillez cliquer dessus pour activer votre compte.", btnGoLogin: "Se connecter" },
        en: { signupTitle: "Point Focal Registration", loginTitle: "Point Focal Login", forgotTitle: "Recovery", invitationCodePh: "Invitation Code (Required)", emailPh: "Email Address", passwordPh: "Password", confirmPasswordPh: "Confirm Password", forgotLink: "Forgot password?", btnSignup: "Register", btnLogin: "Login", btnForgot: "Send link", switchLogin: "Already have an account? <span>Login</span>", switchSignup: "No account? <span>Register</span>", back: "<span>Back</span>", errorMdp: "Passwords do not match.", errorTel: "Invalid WhatsApp number.", logoutTitle: "Your Session", logoutDesc: "You are currently logged in.", btnLogout: "Logout", successReset: "Recovery email sent!", verifyTitle: "Check your email", verifyDesc: "A confirmation link has been sent to you. Please click on it to activate your account.", btnGoLogin: "Go to Login" },
        es: { signupTitle: "Registro Point Focal", loginTitle: "Iniciar Sesión Point Focal", forgotTitle: "Recuperación", invitationCodePh: "Código de invitación (Obligatorio)", emailPh: "Correo Electrónico", passwordPh: "Contraseña", confirmPasswordPh: "Confirmar Contraseña", forgotLink: "¿Contraseña olvidada?", btnSignup: "Registrarse", btnLogin: "Iniciar Sesión", btnForgot: "Enviar enlace", switchLogin: "¿Ya tienes cuenta? <span>Inicia sesión</span>", switchSignup: "¿No tienes cuenta? <span>Regístrate</span>", back: "<span>Volver</span>", errorMdp: "Las contraseñas no coinciden.", errorTel: "Número de WhatsApp inválido.", logoutTitle: "Su Sesión", logoutDesc: "Ya has iniciado sesión.", btnLogout: "Cerrar Sesión", successReset: "¡Correo de récupération enviado!", verifyTitle: "Revise su correo", verifyDesc: "Se ha enviado un enlace de confirmación. Por favor, haga clic en él para activar su cuenta.", btnGoLogin: "Iniciar sesión" },
        pt: { signupTitle: "Cadastro Point Focal", loginTitle: "Login Point Focal", forgotTitle: "Recuperação", invitationCodePh: "Código de Convite (Obrigatório)", emailPh: "Endereço de E-mail", passwordPh: "Senha", confirmPasswordPh: "Confirmar Senha", forgotLink: "Esqueceu a senha?", btnSignup: "Cadastrar", btnLogin: "Entrar", btnForgot: "Enviar link", switchLogin: "Já tem uma conta? <span>Entrar</span>", switchSignup: "Não tem conta? <span>Cadastrar</span>", back: "<span>Voltar</span>", errorMdp: "As senhas não coincidem.", errorTel: "Número de WhatsApp inválido.", logoutTitle: "Sua Sessão", logoutDesc: "Você já está connecté.", btnLogout: "Sair", successReset: "E-mail de recuperação envoyé!", verifyTitle: "Verifique seu e-mail", verifyDesc: "Um link de confirmação foi enviado. Por favor, clique nele para ativar sua conta.", btnGoLogin: "Ir para o Login" }
    };

    const phoneInput = document.querySelector("#whatsapp");
    const iti = window.intlTelInput(phoneInput, { initialCountry: "cd", preferredCountries: ["cd", "fr", "be", "ca", "cg", "ci"], utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js" });

    function changerLangue(lang) {
        langueActive = lang;
        localStorage.setItem("point_focal_lang", lang);
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`btn-${lang}`).classList.add('active');
        rafraichirInterface();
    }

    function rafraichirInterface() {
        const t = lexique[langueActive];
        if (currentMode === "signup") { 
            document.getElementById("formTitle").innerText = t.signupTitle; 
            document.getElementById("btnSubmit").innerText = t.btnSignup; 
            document.getElementById("switchAuth").innerHTML = t.switchLogin; 
        } else if (currentMode === "login") { 
            document.getElementById("formTitle").innerText = t.loginTitle; 
            document.getElementById("btnSubmit").innerText = t.btnLogin; 
            document.getElementById("switchAuth").innerHTML = t.switchSignup; 
        } else { 
            document.getElementById("formTitle").innerText = t.forgotTitle; 
            document.getElementById("btnSubmit").innerText = t.btnForgot; 
            document.getElementById("switchAuth").innerHTML = t.back; 
        }

        document.getElementById("sponsorCode").placeholder = t.invitationCodePh;
        document.getElementById("email").placeholder = t.emailPh;
        document.getElementById("password").placeholder = t.passwordPh;
        document.getElementById("confirmPassword").placeholder = t.confirmPasswordPh;
        document.getElementById("forgotPwdLink").innerText = t.forgotLink;
        
        document.getElementById("txt-logout-title").innerText = t.logoutTitle;
        document.getElementById("txt-logout-desc").innerText = t.logoutDesc;
        document.getElementById("btn-logout").innerText = t.btnLogout;

        document.getElementById("verifyTitle").innerText = t.verifyTitle;
        document.getElementById("verifyDesc").innerText = t.verifyDesc;
        document.getElementById("btnGoToLogin").innerText = t.btnGoLogin;
    }

    function toggleAuthMode(mode) { 
        currentMode = mode; 
        document.getElementById("error-box").style.display = "none"; 
        document.getElementById("success-box").style.display = "none";
        document.getElementById("password").parentNode.style.display = "block"; 
        
        if (mode === 'login') { 
            document.getElementById("sponsorGroup").style.display = "none";
            document.getElementById("whatsappGroup").style.display = "none"; 
            document.getElementById("confirmPasswordGroup").style.display = "none"; 
            document.getElementById("forgotPwdLink").style.display = "block"; 
        } else { 
            document.getElementById("sponsorGroup").style.display = "block";
            document.getElementById("whatsappGroup").style.display = "block"; 
            document.getElementById("confirmPasswordGroup").style.display = "block"; 
            document.getElementById("forgotPwdLink").style.display = "block"; 
        } 
        rafraichirInterface(); 
    }

    function handleSwitchAuth(e) {
        if (!e.target.closest('span')) return;
        if (currentMode === "signup" || currentMode === "forgot") {
            toggleAuthMode("login");
        } else {
            toggleAuthMode("signup");
        }
    }

    function showForgotPasswordForm() { 
        currentMode = "forgot"; 
        document.getElementById("sponsorGroup").style.display = "none";
        document.getElementById("whatsappGroup").style.display = "none"; 
        document.getElementById("confirmPasswordGroup").style.display = "none"; 
        document.getElementById("forgotPwdLink").style.display = "none"; 
        document.getElementById("password").parentNode.style.display = "none"; 
        rafraichirInterface(); 
    }

    function togglePasswordVisibility(id) { const f = document.getElementById(id); f.type = f.type === "password" ? "text" : "password"; }

    window.addEventListener('DOMContentLoaded', () => {
        const lang = localStorage.getItem("point_focal_lang") || "fr";
        changerLangue(lang);
        
        if (localStorage.getItem('token')) { 
            document.getElementById('authSection').style.display = 'none'; 
            document.getElementById('logoutSection').style.display = 'block'; 
            return;
        }

        const urlParams = new URLSearchParams(window.location.search);
        let refCode = urlParams.get('ref');
        
        if (refCode) {
            localStorage.setItem('parrain_point_focal', refCode);
            const sponsorInput = document.getElementById("sponsorCode");
            sponsorInput.value = refCode;
            sponsorInput.readOnly = true;
        } else {
            const savedRef = localStorage.getItem('parrain_point_focal');
            if (savedRef) {
                document.getElementById("sponsorCode").value = savedRef;
            }
        }
        
        toggleAuthMode('signup');
    });

    document.getElementById("authForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const err = document.getElementById("error-box"); 
        const succ = document.getElementById("success-box"); 
        err.style.display = succ.style.display = "none";
        const email = document.getElementById("email").value;

        if (currentMode === "forgot") {
            try {
                const res = await fetch(`${API_URL}/forgot-password`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email }) });
                if (res.ok) { succ.innerText = lexique[langueActive].successReset; succ.style.display = "block"; } else throw new Error();
            } catch (errCapture) { err.innerText = "Erreur Système Récupération : " + errCapture.message; err.style.display = "block"; }
            return;
        }

        const password = document.getElementById("password").value;
        
        if (currentMode === "signup") {
            const sponsor = document.getElementById("sponsorCode").value;
            if (password !== document.getElementById("confirmPassword").value) { err.innerText = lexique[langueActive].errorMdp; err.style.display = "block"; return; }
            if (!iti.isValidNumber()) { err.innerText = lexique[langueActive].errorTel; err.style.display = "block"; return; }
            
            try {
                const res = await fetch(`${API_URL}/signup`, { 
                    method: "POST", 
                    headers: { "Content-Type": "application/json" }, 
                    body: JSON.stringify({ email, whatsapp: iti.getNumber(), password, sponsor: sponsor || null }) 
                });
                const d = await res.json();
                if (res.ok) { 
                    document.getElementById("authSection").style.display = "none";
                    document.getElementById("verifyEmailSection").style.display = "block";
                } else { 
                    err.innerText = d.message || "Erreur lors de l'inscription"; err.style.display = "block"; 
                }
            } catch (errCapture) { 
                // MODIFICATION ICI : On affiche l'erreur brute renvoyée par le téléphone
                err.innerText = "Erreur Système Inscription : " + errCapture.message; 
                err.style.display = "block"; 
            }

        } else if (currentMode === "login") {
            try {
                const res = await fetch(`${API_URL}/login`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email, password }) });
                const d = await res.json();
                if (res.ok) { 
                    localStorage.setItem('token', d.token); 
                    if(d.user) localStorage.setItem('user', JSON.stringify(d.user)); 
                    window.location.href = "video.html"; 
                } else { 
                    err.innerText = d.message || "Identifiants invalides"; err.style.display = "block"; 
                }
            } catch (errCapture) { 
                err.innerText = "Erreur Système Connexion : " + errCapture.message; 
                err.style.display = "block"; 
            }
        }
    });

    function executerDeconnexion() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
