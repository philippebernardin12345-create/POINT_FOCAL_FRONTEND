<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Point Focal V6</title>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 20px; font-family: sans-serif; background-color: #f4f6f9; color: #333; }
        .container { max-width: 600px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #1e3a8a; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #1e3a8a; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:disabled { background-color: #aaa; }
        .status-box { padding: 12px; border-radius: 6px; margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="register-root"></div>

    <script type="text/babel">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        function RegisterForm() {
            // ÉTAPE 1 : Ajout de inviteCode dans l'objet formData
            const [formData, setFormData] = useState({ email: '', whatsapp: '', txHash: '', wallet: '', inviteCode: '' });
            const [status, setStatus] = useState({ message: '', type: '' });
            const [loading, setLoading] = useState(false);

            const API_URL = "https://point-focal-backend.onrender.com/api";

            // ÉTAPE 2 : Lecture de l'URL au chargement pour insérer automatiquement le code
            useEffect(() => {
                const urlParams = new URLSearchParams(window.location.search);
                const refCode = urlParams.get('ref'); // Détecte la fin de l'URL ?ref=CODE
                if (refCode) {
                    setFormData(prev => ({ ...prev, inviteCode: refCode }));
                }
            }, []);

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                // Vérification que le code d'invitation est bien présent lui aussi
                if (!formData.email || !formData.txHash || !formData.wallet || !formData.inviteCode) {
                    return setStatus({ message: "❌ Veuillez remplir les champs obligatoires.", type: "error" });
                }

                setLoading(true);
                setStatus({ message: "⏳ Vérification du paiement sur la Binance Smart Chain...", type: "info" });

                try {
                    const response = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    const data = await response.json();

                    if (response.ok) {
                        setStatus({ message: "✅ Paiement 2.03 USDT Validé ! Votre compte est actif.", type: "success" });
                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 2000);
                    } else {
                        setStatus({ message: `❌ Rejet : ${data.error || 'Vérification échouée'}`, type: "error" });
                    }
                } catch (err) {
                    setStatus({ message: "❌ Erreur de connexion avec le serveur Render.", type: "error" });
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <h2>Formulaire d'Inscription Officiel</h2>
                    <p style={{ fontSize: '0.85rem', color: '#666', textAlign: 'center', marginBottom: '25px' }}>
                        Étape obligatoire : Validation robotisée de la transaction de 2.03 USDT.
                    </p>

                    <form onSubmit={handleSubmit}>
                        <div className="input-group">
                            <label>Adresse E-mail *</label>
                            <input type="email" name="email" value={formData.email} onChange={handleChange} placeholder="exemple@mail.com" required />
                        </div>

                        <div className="input-group">
                            <label>Numéro WhatsApp (Optionnel)</label>
                            <input type="text" name="whatsapp" value={formData.whatsapp} onChange={handleChange} placeholder="+243..." />
                        </div>

                        <div className="input-group">
                            <label>Adresse de votre Portefeuille (BSC BEP-20) *</label>
                            <input type="text" name="wallet" value={formData.wallet} onChange={handleChange} placeholder="0x..." required />
                        </div>

                        <div className="input-group">
                            <label>Hachage de la Transaction (TxHash) *</label>
                            <input type="text" name="txHash" value={formData.txHash} onChange={handleChange} placeholder="Collez le hash à 66 caractères" required />
                        </div>

                        {/* ÉTAPE 3 : Affichage du champ Code d'invitation requis */}
                        <div className="input-group">
                            <label>Code d'invitation (Requis) *</label>
                            <input type="text" name="inviteCode" value={formData.inviteCode} onChange={handleChange} placeholder="Code d'invitation automatique ou manuel" required />
                        </div>

                        <button type="submit" disabled={loading}>
                            {loading ? "Vérification en cours..." : "Valider mon Inscription"}
                        </button>
                    </form>

                    {status.message && (
                        <div className="status-box" style={{
                            backgroundColor: status.type === 'success' ? '#d4edda' : status.type === 'error' ? '#f8d7da' : '#e2e3e5',
                            color: status.type === 'success' ? '#155724' : status.type === 'error' ? '#721c24' : '#383d41'
                        }}>
                            {status.message}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('register-root'));
        root.render(React.createElement(RegisterForm));
    </script>
</body>
</html>
