<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Inscription Obligatoire</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #ff3333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #bbbbbb;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #ffcc00;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #ffcc00;
            color: #000;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #e6b800;
        }
        .error-message {
            color: #ff3333;
            background-color: rgba(255,51,51,0.1);
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            display: none;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="register-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <img src="logo.jpg" alt="Logo Point Focal" style="max-width: 150px; height: auto; border-radius: 4px;">
    </div>
    
    <h2>🔐 INSCRIPTION POINT FOCAL</h2>
    
    <div id="errorBox" class="error-message"></div>

    <form id="registerForm">
        <div class="form-group">
            <label for="email">Adresse E-mail (Unique) *</label>
            <input type="email" id="email" required placeholder="exemple@mail.com">
        </div>

        <div class="form-group">
            <label for="whatsapp">Numéro WhatsApp 📱 *</label>
            <input type="tel" id="whatsapp" required placeholder="+243xxxxxxxxx">
        </div>

        <div class="form-group">
            <label for="password">Mot de passe *</label>
            <input type="password" id="password" required placeholder="********">
        </div>

        <div class="form-group">
            <label for="passwordConfirm">Confirmez le mot de passe *</label>
            <input type="password" id="passwordConfirm" required placeholder="********">
        </div>

        <div class="form-group">
            <label for="invitationCode">Code d'invitation (Requis) *</label>
            <input type="text" id="invitationCode" required placeholder="ABCD1234 ou KM-XXXX">
        </div>

        <button type="submit">Créer mon compte sécurisé</button>
    </form>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const errorBox = document.getElementById('errorBox');
        errorBox.style.display = 'none';

        const email = document.getElementById('email').value.trim();
        const whatsapp = document.getElementById('whatsapp').value.trim();
        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('passwordConfirm').value;
        const invitationCode = document.getElementById('invitationCode').value.trim();

        if (password !== passwordConfirm) {
            errorBox.innerText = "La confirmation du mot de passe ne correspond pas.";
            errorBox.style.display = 'block';
            return;
        }

        try {
            // URL de votre API Render injectée ici
            const response = await fetch('https://point-focal.onrender.com/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, whatsapp, password, passwordConfirm, invitationCode })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                alert("Inscription réussie ! Veuillez vérifier vos e-mails pour confirmer votre compte.");
                window.location.href = "login.html";
            } else {
                errorBox.innerText = data.error || "Une erreur est survenue lors de l'inscription.";
                errorBox.style.display = 'block';
            }
        } catch (err) {
            errorBox.innerText = "Impossible de contacter le serveur de sécurité sur Render.";
            errorBox.style.display = 'block';
        }
    });
</script>

</body>
</html>
