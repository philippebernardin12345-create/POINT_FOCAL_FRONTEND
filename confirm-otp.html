<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmation OTP - Point Focal</title>
<style>
body{background:#0b0e11;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;padding:20px}
.box{background:#1e2329;padding:30px;border-radius:14px;max-width:420px;width:100%}
input,button{width:100%;padding:14px;margin-top:15px;border-radius:8px;font-size:16px}
input{background:#2b3139;color:white;border:1px solid #444}
button{background:#f0b90b;color:#000;border:none;font-weight:bold}
.msg{margin-top:15px}
</style>
</head>
<body>

<div class="box">
<h2>Confirmer votre e-mail</h2>
<p>Entrez le code OTP reçu par e-mail.</p>

<input type="email" id="email" placeholder="Votre e-mail">
<input type="text" id="otp" placeholder="Code OTP à 6 chiffres" maxlength="6">

<button onclick="confirmOtp()">Confirmer</button>

<div id="msg" class="msg"></div>
</div>

<script>
const BASE_API = "https://point-focal.onrender.com/api/auth";

document.getElementById("email").value = localStorage.getItem("pendingEmail") || "";

async function confirmOtp() {
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  const msg = document.getElementById("msg");

  if (!email || !otp) {
    msg.innerText = "Email et code OTP obligatoires.";
    msg.style.color = "#f6465d";
    return;
  }

  try {
    const res = await fetch(`${BASE_API}/confirm-otp`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, otp })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.innerText = data.message || "Code OTP invalide ou expiré.";
      msg.style.color = "#f6465d";
      return;
    }

    localStorage.removeItem("pendingEmail");

    msg.innerText = "E-mail confirmé avec succès. Redirection vers la connexion...";
    msg.style.color = "#0ecb81";

    setTimeout(() => {
      window.location.href = "register.html";
    }, 1500);

  } catch (err) {
    msg.innerText = "Erreur réseau. Réessayez.";
    msg.style.color = "#f6465d";
  }
}
</script>

</body>
</html>
