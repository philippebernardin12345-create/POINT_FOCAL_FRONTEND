<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Espace Membre</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .dashboard-layout {
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 12px rgba(0,0,0,0.3);
        }

        h1, h2 {
            color: #00bfff;
        }

        .stat {
            font-size: 1.2rem;
            margin: 10px 0;
        }

        button {
            background: #00bfff;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="dashboard-layout">

    <h1>📊 Tableau de bord Point Focal</h1>

    <div class="card">
        <h2>👤 Informations du compte</h2>
        <div class="stat">
            Identifiant : <span id="userId">Chargement...</span>
        </div>
        <div class="stat">
            Statut : <span id="status">Actif</span>
        </div>
    </div>

    <div class="card">
        <h2>🔗 Mes liens</h2>

        <p>
            <strong>Lien public :</strong>
        </p>
        <p id="publicLink">
            Aucun lien disponible.
        </p>

        <p>
            <strong>Lien KM :</strong>
        </p>
        <p id="kmLink">
            Aucun lien disponible.
        </p>
    </div>

    <div class="card">
        <h2>⚙️ Actions rapides</h2>

        <button onclick="logout()">
            Déconnexion
        </button>
    </div>

</div>

<script>
    function logout() {
        localStorage.clear();
        alert("Déconnexion effectuée.");
        window.location.href = "index.html";
    }

    document.getElementById("userId").textContent =
        localStorage.getItem("userId") || "Utilisateur";

    document.getElementById("publicLink").textContent =
        localStorage.getItem("publicLink") || "Aucun lien enregistré.";

    document.getElementById("kmLink").textContent =
        localStorage.getItem("kmLink") || "Aucun lien enregistré.";
</script>

</body>
</html>
