<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Focal - Espace Membre</title>
<style>
    body { background:#121212; color:white; font-family:'Segoe UI', Arial, sans-serif; margin:0; padding:20px; }
    .container { max-width:600px; margin:auto; }
    h1 { color:#00cc44; text-align:center; margin-bottom:25px; text-transform: uppercase; font-size: 24px;}
    .card { background:#1e1e1e; border-radius:12px; padding:20px; margin-bottom:15px; border: 1px solid #333; }
    h2 { color:#00cc44; margin-top: 0; margin-bottom:15px; font-size: 18px; }
    .stat { margin:8px 0; font-size:14px; color:#aaa; }
    .value { color:#fff; font-weight:bold; word-break: break-all; font-family: monospace; background: #252525; padding: 10px; border-radius: 6px; margin-top: 5px; display: block;}
    button { width:100%; padding:12px; background:#ff3333; border:none; color:white; font-weight:bold; border-radius:6px; cursor:pointer; font-size: 15px;}
    button:hover { background:#cc2424; }
</style>
</head>
<body>

<div class="container">
    <h1>👤 Dashboard Utilisateur</h1>

    <div class="card">
        <h2>ℹ️ Informations de Compte</h2>
        <div class="stat">E-mail : <span style="color: white; font-weight: bold;" id="email">...</span></div>
        <div class="stat">ID Utilisateur : <span style="color: white; font-weight: bold;" id="id">...</span></div>
        <div class="stat">Code d'invitation généré : <span style="color: #ffcc00; font-weight: bold;" id="code">...</span></div>
    </div>

    <div class="card">
        <h2>🔗 Liens Générés Automatiquement</h2>
        <div class="stat">Lien Point Focal Public (Destiné aux réseaux sociaux) :</div>
        <div class="value" id="publicLink">Génération en cours...</div>
    </div>

    <div class="card">
        <h2>⚙️ Gestion de session</h2>
        <button onclick="logout()">Se déconnecter</button>
    </div>
</div>

<script>
const token = localStorage.getItem("token");
const user = JSON.parse(localStorage.getItem("user") || "{}");

if (!token) {
    window.location.href = "register.html";
}

document.getElementById("email").textContent = user.email || "Non disponible";
document.getElementById("id").textContent = user.id || "Non disponible";
document.getElementById("code").textContent = user.invitation_code || "Non disponible";

// Affichage exclusif du Lien Public réglementaire (Section 10)
document.getElementById("publicLink").textContent = localStorage.getItem("publicLink") || "Aucun lien disponible";

function logout() {
    localStorage.clear();
    window.location.href = "register.html";
}
</script>

</body>
</html>
