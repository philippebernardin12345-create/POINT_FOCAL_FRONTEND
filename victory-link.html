<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Focal - Attribution du Lien Victory</title>
    <style>
        body { 
            background-color: #0B0E11; 
            color: #EAECEF; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
        }
        .card { 
            background-color: #1E2329; 
            padding: 40px; 
            border-radius: 6px; 
            max-width: 500px; 
            width: 100%; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .timer-box { 
            background: rgba(234, 57, 67, 0.1); 
            border-left: 4px solid #EA3943; 
            color: #EA3943; 
            padding: 15px; 
            margin-bottom: 25px; 
            font-weight: bold; 
            border-radius: 4px;
            font-size: 14px;
        }
        .link-box { 
            background: #2B3139; 
            color: #F0B90B; 
            padding: 18px; 
            border-radius: 4px; 
            margin-bottom: 25px; 
            font-family: 'Courier New', Courier, monospace; 
            font-weight: bold;
            word-break: break-all;
            border: 1px dashed #474D57;
        }
        .btn-ready { 
            background: #02C076; 
            color: white; 
            padding: 16px; 
            border: none; 
            width: 100%; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }
        .btn-ready:hover {
            background: #03A666;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Règle de la matrice : Chronomètre d'activation de 24 heures -->
    <div class="timer-box">⏳ CHRONOMÈTRE DE MATRICE (24H) : Votre lien expire dans 24 heures sans activation.</div>
    
    <p style="color: #848E9C; font-size: 15px; margin-bottom: 15px;">Voici votre Lien Victory Automatic attribué (Système FIFO) :</p>
    <div id="linkDisplay" class="link-box">Génération de votre lien en cours...</div>
    
    <button id="btnNext" class="btn-ready" onclick="window.location.href='payment.html'">Passer au Paiement sécurisé</button>
</div>

<script>
    window.onload = async () => {
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!token) {
            window.location.href = "register.html";
            return;
        }

        // AJOUT N°2 : Sécurité en cas d'utilisateur déjà activé
        if (user && user.isActivated) {
            window.location.href = "dashboard.html";
            return;
        }

        // Appel API automatique pour charger ou assigner le lien (FIFO / Parrain réel)
        try {
            const res = await fetch('https://point-focal.onrender.com/api/victory-link/assign', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });
            
            const data = await res.json();
            
            if (res.ok && data.url) {
                document.getElementById('linkDisplay').innerText = data.url;
            } else {
                document.getElementById('linkDisplay').innerText = "Erreur d'attribution. Contactez le support.";
                document.getElementById('linkDisplay').style.color = "#EA3943";
            }
        } catch (error) {
            console.error("Erreur serveur :", error);
            document.getElementById('linkDisplay').innerText = "Erreur de connexion avec le serveur.";
        }
    }
</script>
</body>
</html>
