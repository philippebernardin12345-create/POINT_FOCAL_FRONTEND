<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POINT FOCAL - Connexion</title>

<style>
body {
    background:#121212;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
}

.container {
    background:#1e1e1e;
    padding:25px;
    border-radius:10px;
    width:100%;
    max-width:400px;
}

h2 {
    color:#ffcc00;
    text-align:center;
}

input {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#0d0d0d;
    border:1px solid #333;
    color:white;
    box-sizing:border-box;
}

button {
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#ffcc00;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:disabled {
    opacity:0.6;
    cursor:not-allowed;
}

.box {
    display:none;
    margin-top:10px;
    padding:10px;
}

#error { color:red; }
#success { color:green; }

.link {
    text-align:center;
    margin-top:10px;
    font-size:14px;
    color:#aaa;
    cursor:pointer;
}

.link span {
    color:#ffcc00;
}
</style>
</head>

<body>

<div class="container">

    <h2>Connexion Point Focal</h2>

    <form id="loginForm">

        <input id="email" type="email" placeholder="Email" required>

        <input id="password" type="password" placeholder="Mot de passe" required>

        <button id="loginBtn" type="submit">Se connecter</button>

        <div id="error" class="box"></div>
        <div id="success" class="box"></div>

    </form>

    <div class="link" onclick="goRegister()">
        Pas de compte ? <span>Inscrivez-vous</span>
    </div>

</div>

<script>
const API_URL = "https://point-focal.onrender.com/api/auth";

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const errorBox = document.getElementById("error");
    const successBox = document.getElementById("success");
    const loginBtn = document.getElementById("loginBtn");

    errorBox.style.display = "none";
    successBox.style.display = "none";

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (!email || !password) {
        errorBox.innerText = "Email et mot de passe obligatoires.";
        errorBox.style.display = "block";
        return;
    }

    loginBtn.disabled = true;
    loginBtn.innerText = "Connexion...";

    try {
        localStorage.removeItem("token");
        localStorage.removeItem("user");

        const res = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await res.json();alert(JSON.stringify(data));

        if (!res.ok) {
            errorBox.innerText = data.message || data.error || "Erreur de connexion.";
            errorBox.style.display = "block";
            return;
        }

        const token = data.token || data.data?.token;
        const user = data.user || data.data?.user;

        if (!token || !user) {
            errorBox.innerText = "Réponse de connexion invalide.";
            errorBox.style.display = "block";
            return;
        }

        localStorage.setItem("token", token);
        localStorage.setItem("user", JSON.stringify(user));

        successBox.innerText = "Connexion réussie...";
        successBox.style.display = "block";

        setTimeout(() => {
            window.location.href = "video.html";
        }, 800);

    } catch (err) {
        errorBox.innerText = "Erreur réseau : " + err.message;
        errorBox.style.display = "block";
    } finally {
        loginBtn.disabled = false;
        loginBtn.innerText = "Se connecter";
    }
});

function goRegister() {
    window.location.href = "register.html";
}
</script>

</body>
</html>
