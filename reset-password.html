<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Point Focal - Nouveau mot de passe</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            font-family: Arial, sans-serif;

            background: #0B0E11;
            color: #EAECEF;
        }

        .container {
            width: 100%;
            max-width: 420px;

            background: #1E2329;

            padding: 30px;

            border-radius: 10px;
        }

        h2 {
            text-align: center;
            color: #F0B90B;
            margin-top: 0;
        }

        p {
            color: #B7BDC6;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;

            font-weight: bold;
        }

        input {
            width: 100%;

            padding: 14px;

            border-radius: 6px;

            border: 1px solid #474D57;

            background: #0B0E11;

            color: #EAECEF;

            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #F0B90B;
        }

        button {
            width: 100%;

            margin-top: 25px;

            padding: 15px;

            border: none;

            border-radius: 6px;

            background: #F0B90B;

            color: black;

            font-size: 15px;

            font-weight: bold;

            cursor: pointer;
        }

        button:disabled {
            opacity: 0.6;
        }

        .message {
            display: none;

            margin-top: 20px;

            padding: 12px;

            border-radius: 6px;
        }

        .success {
            display: block;

            background: rgba(
                2,
                192,
                118,
                0.15
            );

            color: #58D6A5;
        }

        .error {
            display: block;

            background: rgba(
                246,
                70,
                93,
                0.15
            );

            color: #FF7588;
        }

    </style>

</head>

<body>

    <div class="container">

        <h2>
            🔒 Nouveau mot de passe
        </h2>

        <p>
            Saisissez votre nouveau mot de passe.
        </p>

        <label>
            Nouveau mot de passe
        </label>

        <input
            id="password"
            type="password"
            placeholder="********"
        >

        <label>
            Confirmer le mot de passe
        </label>

        <input
            id="confirmPassword"
            type="password"
            placeholder="********"
        >

        <button id="submitBtn">
            Réinitialiser
        </button>

        <div
            id="message"
            class="message"
        ></div>

    </div>

    <script>

        const API_URL =
            "https://point-focal.onrender.com/api";

        const params =
            new URLSearchParams(
                window.location.search
            );

        const token =
            params.get("token");

        const passwordInput =
            document.getElementById(
                "password"
            );

        const confirmPasswordInput =
            document.getElementById(
                "confirmPassword"
            );

        const submitBtn =
            document.getElementById(
                "submitBtn"
            );

        const messageBox =
            document.getElementById(
                "message"
            );

        function showMessage(
            text,
            type
        ) {

            messageBox.textContent =
                text;

            messageBox.className =
                "message " + type;
        }

        submitBtn.addEventListener(
            "click",
            async function () {

                const password =
                    passwordInput.value.trim();

                const confirmPassword =
                    confirmPasswordInput.value.trim();

                if (!token) {

                    showMessage(
                        "Lien invalide.",
                        "error"
                    );

                    return;
                }

                if (
                    !password ||
                    !confirmPassword
                ) {

                    showMessage(
                        "Complétez tous les champs.",
                        "error"
                    );

                    return;
                }

                if (
                    password !==
                    confirmPassword
                ) {

                    showMessage(
                        "Les mots de passe ne correspondent pas.",
                        "error"
                    );

                    return;
                }

                submitBtn.disabled = true;

                submitBtn.textContent =
                    "Patientez...";

                try {

                    const response =
                        await fetch(
                            `${API_URL}/auth/reset-password`,
                            {
                                method: "POST",

                                headers: {
                                    "Content-Type":
                                        "application/json"
                                },

                                body: JSON.stringify(
                                    {
                                        token,
                                        password
                                    }
                                )
                            }
                        );

                    const data =
                        await response.json();

                    if (
                        !response.ok
                    ) {

                        throw new Error(
                            data.message
                            ||
                            "Erreur."
                        );
                    }

                    showMessage(
                        "Mot de passe modifié avec succès.",
                        "success"
                    );

                    setTimeout(
                        function () {

                            window.location.href =
                                "login.html";

                        },
                        2500
                    );

                } catch (
                    error
                ) {

                    showMessage(
                        error.message,
                        "error"
                    );
                }

                submitBtn.disabled =
                    false;

                submitBtn.textContent =
                    "Réinitialiser";

            }
        );

    </script>

</body>
</html>
